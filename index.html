</style></head><body><a class="skip" href="#main">Sari la conținut / Skip to content</a><div id="app"></div><div id="live" class="sr" role="status" aria-live="polite"></div><script>
const KEY='linguax-gplay-v1',$=(s,r=document)=>r.querySelector(s),$$=(s,r=document)=>[...r.querySelectorAll(s)];
let S=JSON.parse(localStorage.getItem(KEY)||'null');
const TXT={ro:{home:'Acasă',practice:'Practică',quests:'Quest-uri',rank:'Clasament',profile:'Profil',audit:'Audit',cert:'Certificat',shop:'Shop',start:'Pornește',progress:'Progres',export:'Exportă progres',read:'Citește',stop:'Oprește',done:'finalizate',optional:'opțional',complete:'complet'},en:{home:'Home',practice:'Practice',quests:'Quests',rank:'Leaderboard',profile:'Profile',audit:'Audit',cert:'Certificate',shop:'Shop',start:'Start',progress:'Progress',export:'Export progress',read:'Read',stop:'Stop',done:'completed',optional:'optional',complete:'complete'}};
const C={en:['Hello & Goodbye','Please & Thank you','People','Numbers 1-10','Colors','Family','Home','Food','Time','Travel basics'],ro:['Salut și la revedere','Te rog și mulțumesc','Persoane','Numere 1-10','Culori','Familie','Acasă','Mâncare','Timp','Călătorii'],sign:['Salut','Mulțumesc','Nume','Eu și Tu','Încântat','Familie','Ajutor','Mini-dialog vizual']};
const Q={en:[['mc','What does “Hello” mean?',['Bună','La revedere','Mulțumesc'],0,'Hello = Bună.'],['mc','Choose “thank you”.',['Thank you','House','Blue'],0,'Thank you expresses gratitude.'],['arr','Build: My name is Ana',['My','name','is','Ana'],[0,1,2,3],''],['mc','What is number 5?',['Five','Two','Ten'],0,'Five = 5.'],['mc','Blue means',['Albastru','Roșu','Verde'],0,'Blue = albastru.'],['mc','Mother means',['Mamă','Tată','Frate'],0,'Mother = mamă.'],['mc','House means',['Casă','Mâncare','Oră'],0,'House = casă.'],['mc','Water means',['Apă','Pâine','Cafea'],0,'Water = apă.'],['arr','Build: It is morning',['It','is','morning'],[0,1,2],''],['mc','Ticket means',['Bilet','Hotel','Nume'],0,'Ticket = bilet.']],ro:[['mc','Ce înseamnă „salut”?',['Hello','Goodbye','Thank you'],0,'Salut = hello.'],['mc','Ce înseamnă „mulțumesc”?',['Thank you','Please','Sorry'],0,'Mulțumesc = thank you.'],['arr','Construiește: Mă numesc Ana',['Mă','numesc','Ana'],[0,1,2],''],['mc','„cinci” înseamnă',['Five','Two','Ten'],0,'Cinci = five.'],['mc','„albastru” înseamnă',['Blue','Red','Green'],0,'Albastru = blue.'],['mc','„mamă” înseamnă',['Mother','Father','Brother'],0,'Mamă = mother.'],['mc','„casă” înseamnă',['House','Food','Time'],0,'Casă = house.'],['mc','„apă” înseamnă',['Water','Bread','Coffee'],0,'Apă = water.'],['arr','Construiește: Este dimineață',['Este','dimineață'],[0,1],''],['mc','„bilet” înseamnă',['Ticket','Hotel','Name'],0,'Bilet = ticket.']],sign:[['mc','SALUT: descriere corectă',['Mâna lângă umăr, palma spre exterior','Mâna în buzunar','Bate din palme'],0,'Salutul este clar și prietenos.'],['mc','MULȚUMESC: mișcare potrivită',['De la bărbie spre exterior','Pumn pe masă','Acoperi ochii'],0,'Mulțumesc pornește de lângă bărbie.'],['mc','NUME transmite',['Identificarea persoanei','O culoare','Un drum'],0,'Nume identifică persoana.'],['mc','EU se indică prin',['Arăți spre tine','Arăți spre cer','Închizi ochii'],0,'EU = spre propria persoană.'],['mc','ÎNCÂNTAT are nevoie de',['Expresie prietenoasă','Text mic','Mișcare haotică'],0,'Expresia susține sensul.'],['mc','FAMILIE sugerează',['Grup apropiat','Un obiect','O stradă'],0,'Familia este reprezentată ca grup.'],['arr','Secvență: Te rog + ajutor',['Te rog','Ajutor'],[0,1],''],['arr','Mini-dialog: Salut + Eu + Nume + Ajutor',['Salut','Eu','Nume','Ajutor'],[0,1,2,3],'']]};
const L={en:['🇬🇧','English basics'],ro:['🇷🇴','Română basics'],sign:['🤟','Sign language intro']},P={custom:['✨','Personalizat / Custom',{}],blind:['🦯','Blind users',{voice:1,auto:1,contrast:1,large:1,describe:1,reduce:1,simple:1}],low:['🔍','Low vision',{contrast:1,large:1,describe:1}],dyslexia:['📖','Dyslexia',{dyslexia:1,large:1,reduce:1,simple:1}],deaf:['🧏','Deaf / hard-of-hearing',{describe:1,captions:1}],motor:['⌨️','Reduced mobility',{large:1,reduce:1,simple:1}],adhd:['🎯','ADHD / focus mode',{focus:1,reduce:1,simple:1}]};
function T(k){return TXT[S?.ui||'ro'][k]||k}function save(){localStorage.setItem(KEY,JSON.stringify(S))}function units(lang){let a=C[lang],cuts=lang==='sign'?[4,7,8]:[4,7,10],from=0;return cuts.map((to,i)=>{let ls=a.slice(from,to).map((x,j)=>({id:lang+'-'+(from+j),title:x,done:0,score:0}));from=to;return{title:['Basics','Daily life','Travel / Dialogue'][i],locked:i>0,quiz:0,lessons:ls}})}
function fresh(){let a={describe:1,keyboard:1};Object.assign(a,P[$('#prof').value][2]);['contrast','large','voice','reduce','focus'].forEach(k=>a[k]=$('#'+k).checked?1:a[k]||0);a.simple=a.simple||a.focus;return{ui:$('#ui').value,tab:'learn',course:$('#course').value,u:{name:$('#name').value.trim(),xp:0,gems:0,streak:0,hearts:5,start:new Date().toISOString().slice(0,10)},a,units:units($('#course').value),exports:0}}
function apply(){if(!S)return;['contrast','large','reduce','dyslexia','focus'].forEach(k=>document.body.classList.toggle(k,!!S.a[k]));document.documentElement.lang=S.ui}
function allLessons(){return S.units.flatMap(u=>u.lessons)}function done(){return allLessons().filter(l=>l.done).length}function pct(){return Math.round(done()/allLessons().length*100)}function unlock(){S.units.forEach((u,i)=>u.locked=i&& !S.units[i-1].lessons.every(l=>l.done))}
function speak(x){try{speechSynthesis.cancel();let u=new SpeechSynthesisUtterance(String(x));u.lang=S?.ui==='en'?'en-US':'ro-RO';speechSynthesis.speak(u)}catch(e){}}function say(x){$('#live').textContent=x;if(S?.a?.voice&&S?.a?.auto)speak(x)}
function onboarding(){document.body.className='';$('#app').innerHTML=`<main class="onboard"><section class="panel"><p class="eyebrow">LINGUAX Accessible · Google Play MVP</p><h1>Alege cursul și accesibilizarea / Choose course and accessibility</h1><p class="muted">RO/EN complet, lecții reale, quiz-uri, export progres, certificat și pagină de accessibility audit.</p><form id="f"><div class="grid"><div class="field"><label>Interface</label><select id="ui"><option value="ro">Română</option><option value="en">English</option></select></div><div class="field"><label>Prenume / First name</label><input id="name" required minlength="2" placeholder="Laura"></div></div><div class="grid"><div class="field"><label>Course</label><select id="course"><option value="en">🇬🇧 10 English basics</option><option value="ro">🇷🇴 10 Romanian basics</option><option value="sign">🤟 8 Sign language intro</option></select></div><div class="field"><label>Accessibility profile</label><select id="prof">${Object.entries(P).map(([k,v])=>`<option value="${k}">${v[0]} ${v[1]}</option>`).join('')}</select></div></div><section class="panel"><h2>Accessibility setup</h2><div class="grid"><label class="toggle">High contrast<input id="contrast" type="checkbox"></label><label class="toggle">Large text<input id="large" type="checkbox"></label><label class="toggle">Voice mode<input id="voice" type="checkbox"></label><label class="toggle">Reduce motion<input id="reduce" type="checkbox"></label><label class="toggle">Focus mode<input id="focus" type="checkbox"></label></div></section><div class="grid3"><div class="card"><h3>10 English basics</h3><p class="muted">Vocabulary + phrases</p></div><div class="card"><h3>10 Romanian basics</h3><p class="muted">For international learners</p></div><div class="card"><h3>8 Sign language intro</h3><p class="muted">Gesture descriptions</p></div></div><button class="btn full">${TXT.ro.start} / Start</button></form></section></main>`;$('#prof').onchange=e=>Object.keys(P[e.target.value][2]).forEach(k=>{let el=$('#'+k);if(el)el.checked=1});$('#f').onsubmit=e=>{e.preventDefault();S=fresh();save();render()}}
function chrome(){return`<header class="top"><div class="logo"><b>LINGUA</b><span>X</span></div><div class="stats"><span class="pill">${L[S.course][0]} ${L[S.course][1]}</span><span class="pill">❤️ ${S.u.hearts}</span><span class="pill">💎 ${S.u.gems}</span><span class="pill">⚡ ${S.u.xp}</span><button class="btn secondary" id="lang">${S.ui==='ro'?'EN':'RO'}</button></div></header><main id="main" class="wrap" tabindex="-1"></main><nav id="nav" class="nav"></nav><section id="modal" class="modal" role="dialog" aria-modal="true"></section>`}
const tabs=[['learn','🏠','home'],['practice','🎯','practice'],['quests','📜','quests'],['rank','🏆','rank'],['profile','👤','profile'],['shop','🛒','shop'],['audit','♿','audit'],['cert','🎓','cert']];
function render(){if(!S){onboarding();return}unlock();apply();save();$('#app').innerHTML=chrome();let ts=S.a.focus?tabs.filter(x=>!['rank','shop'].includes(x[0])):tabs;$('#nav').innerHTML=ts.map(x=>`<button class="tab" data-t="${x[0]}" aria-current="${S.tab===x[0]?'page':'false'}"><span>${x[1]}</span>${T(x[2])}</button>`).join('');$('#nav').onclick=e=>{let b=e.target.closest('button');if(b){S.tab=b.dataset.t;render()}};$('#main').innerHTML=(S.a.voice?`<section class="voicebar"><button class="btn secondary" id="read">${T('read')}</button><button class="btn secondary" id="stop">${T('stop')}</button></section>`:'')+V[S.tab]();bind()}
function lesson(l,lock){return`<button class="lesson" data-l="${l.id}" ${lock?'disabled':''}><b>${l.done?'✅':'⬜'} ${l.title}</b><span>${l.done?l.score+'%':'Start'}</span></button>`}
const V={learn(){let p=pct();return`<section class="hero"><div><p class="eyebrow">Welcome, ${S.u.name}</p><h1>${L[S.course][1]}</h1><p class="muted">${allLessons().length} lessons + quiz after each unit · export · certificate · audit</p></div><div class="big">${L[S.course][0]}</div></section><section class="panel"><h2>${T('progress')}</h2><p>${done()}/${allLessons().length} ${T('done')} · ${p}%</p><div class="progress"><div class="bar" style="width:${p}%"></div></div></section>${S.units.map((u,i)=>`<section class="panel"><h2>${u.title}</h2>${u.lessons.map(l=>lesson(l,u.locked)).join('')}${u.lessons.every(l=>l.done)?`<button class="btn secondary full" data-q="${i}">Unit quiz ${u.quiz?'✅':''}</button>`:''}</section>`).join('')}`},practice(){return`<section class="panel"><h1>${T('practice')}</h1><div class="grid">${allLessons().map(l=>`<button class="card lesson" data-l="${l.id}"><b>${l.title}</b><span>${l.done?l.score+'%':'new'}</span></button>`).join('')}</div></section>`},quests(){let qs=[['First lesson',done()>0],['One full unit',S.units.some(u=>u.lessons.every(l=>l.done))],['Export progress',S.exports>0],['Audit score 80+',audit()>=80],['Complete path',done()===allLessons().length]];return`<section class="panel"><h1>${T('quests')}</h1>${qs.map(q=>`<p class="${q[1]?'ok':'warn'}">${q[1]?'✅':'⬜'} ${q[0]}</p>`).join('')}</section>`},rank(){return`<section class="panel"><h1>${T('rank')}</h1>${['Laura','Mara','Alex','Sam'].map((n,i)=>`<div class="score-row"><span>${i+1}. ${n}</span><b>${Math.max(10,S.u.xp-i*15)} XP</b></div>`).join('')}</section>`},profile(){return`<section class="panel"><h1>${S.u.name}</h1><div class="grid"><div class="card"><p class="big">${pct()}%</p><p>${done()}/${allLessons().length} ${T('done')}</p></div><div class="card"><h2>Accessibility</h2><div class="chips">${settings().map(x=>`<span class="pill">${x}</span>`).join('')}</div></div></div><button class="btn" id="export">${T('export')}</button> <button class="btn secondary" id="reset">Reset</button></section>`},shop(){return`<section class="panel"><h1>${T('shop')}</h1><div class="grid3"><div class="card">❤️ Extra heart</div><div class="card">⚡ XP Boost</div><div class="card">🧊 Streak shield</div></div></section>`},audit(){return`<section class="panel"><p class="eyebrow">Accessibility Audit</p><h1>${T('audit')}</h1><p class="muted">Selling point: contrast, keyboard navigation, voice mode, image descriptions, reduce motion, screen reader labels, simplified navigation and focus mode.</p><p class="big">${audit()}%</p><div class="progress"><div class="bar" style="width:${audit()}%"></div></div>${['contrast','keyboard','voice','describe','reduce','screen reader labels','simple','focus'].map(k=>`<div class="score-row"><span>${k}</span><b class="${(S.a[k]||k==='screen reader labels'||k==='keyboard')?'ok':'warn'}">${(S.a[k]||k==='screen reader labels'||k==='keyboard')?T('complete'):T('optional')}</b></div>`).join('')}</section>`},cert(){let ok=done()===allLessons().length;return`<section class="panel"><h1>${T('cert')}</h1>${ok?certHTML():`<p class="muted">Complete all lessons to unlock certificate. ${pct()}% done.</p>`}<button class="btn" id="certBtn" ${ok?'':'disabled'}>Download certificate</button></section>`}};
function bind(){$('#lang').onclick=()=>{S.ui=S.ui==='ro'?'en':'ro';render()};$('#read')?.addEventListener('click',()=>speak($('#main').innerText));$('#stop')?.addEventListener('click',()=>speechSynthesis.cancel());$$('[data-l]').forEach(b=>b.onclick=()=>openLesson(b.dataset.l));$$('[data-q]').forEach(b=>b.onclick=()=>unitQuiz(+b.dataset.q));$('#export')?.addEventListener('click',exportProgress);$('#reset')?.addEventListener('click',()=>{localStorage.removeItem(KEY);S=null;onboarding()});$('#certBtn')?.addEventListener('click',downloadCert)}
function find(id){for(let u of S.units){let l=u.lessons.find(x=>x.id===id);if(l)return l}}function qFor(id){let [lang,n]=id.split('-');return Q[lang][+n]||Q[lang][0]}
function openLesson(id){let l=find(id),q=qFor(id);ask(q,good=>{if(good&&!l.done){l.done=1;l.score=100;S.u.xp+=10;S.u.gems+=5}render()})}
function unitQuiz(i){let arr=S.units[i].lessons.map(l=>qFor(l.id)),idx=0,ok=0;function next(){if(idx>=arr.length){S.units[i].quiz=1;S.u.xp+=20;S.u.gems+=10;save();render();alert('Quiz: '+ok+'/'+arr.length);return}ask(arr[idx++],g=>{if(g)ok++;next()})}next()}
function ask(q,cb){let m=$('#modal'),sel=[];m.classList.add('open');m.innerHTML=`<div class="mhead"><button class="btn secondary" id="x">×</button><h2>${q[1]}</h2></div><div class="mbody" id="qa"></div>`;$('#x').onclick=()=>{m.classList.remove('open');render()};if(q[0]==='mc'){$('#qa').innerHTML=q[2].map((o,i)=>`<button class="option" data-i="${i}">${o}</button>`).join('')+`<p id="fb"></p>`;$$('.option').forEach(b=>b.onclick=()=>{let good=+b.dataset.i===q[3];$('#fb').innerHTML=`<b class="${good?'ok':'bad'}">${good?'Correct':'Try again'}</b> — ${q[5]} <br><button class="btn" id="cont">Continue</button>`;$('#cont').onclick=()=>{m.classList.remove('open');cb(good)}})}else{$('#qa').innerHTML=`<div id="sent" class="sentence"></div>${q[2].map((w,i)=>`<button class="word" data-i="${i}">${w}</button>`).join('')}<p id="fb"></p>`;$$('.word').forEach(b=>b.onclick=()=>{sel.push(+b.dataset.i);$('#sent').appendChild(b);if(sel.length===q[3].length){let good=JSON.stringify(sel)===JSON.stringify(q[3]);$('#fb').innerHTML=`<b class="${good?'ok':'bad'}">${good?'Correct':'Almost'}</b><br><button class="btn" id="cont">Continue</button>`;$('#cont').onclick=()=>{m.classList.remove('open');cb(good)}}})}say(q[1])}
function settings(){return Object.entries(S.a).filter(([k,v])=>v).map(([k])=>k)}function audit(){let keys=['contrast','keyboard','voice','describe','reduce','simple','focus'];return Math.round((1+keys.filter(k=>S.a[k]).length)/8*100)}
function exportProgress(){let data={app:'LINGUAX Accessible',name:S.u.name,course:L[S.course][1],completed:done(),total:allLessons().length,progress:pct(),xp:S.u.xp,gems:S.u.gems,accessibilityScore:audit(),settings:settings(),date:new Date().toISOString()};S.exports++;save();let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(data,null,2)],{type:'application/json'}));a.download='linguax-progress-report.json';a.click();render()}
function certHTML(){return`<div class="certificate"><p>LINGUAX Accessible</p><h2>Certificate of Completion</h2><p>This certifies that</p><h1>${S.u.name}</h1><p>completed ${L[S.course][1]}</p><p><b>${pct()}% · ${S.u.xp} XP · ${new Date().toISOString().slice(0,10)}</b></p></div>`}function downloadCert(){let a=document.createElement('a');a.href=URL.createObjectURL(new Blob(['<!doctype html><meta charset=utf-8><title>Certificate</title><style>body{font-family:Georgia,serif;padding:2rem}.certificate{border:8px double #8a5a00;border-radius:28px;padding:3rem;text-align:center;background:#fff8e8;color:#16110a}</style>'+certHTML()],{type:'text/html'}));a.download='linguax-certificate.html';a.click()}
document.addEventListener('keydown',e=>{if(e.key==='Escape'){$('#modal')?.classList.remove('open')}if(S&&e.altKey){let m={'1':'learn','2':'practice','3':'quests','4':'rank','5':'profile','6':'shop','7':'audit','8':'cert'};if(m[e.key]){S.tab=m[e.key];render()}if(e.key.toLowerCase()==='r')speak($('#main').innerText);if(e.key.toLowerCase()==='s')speechSynthesis.cancel()}});
render();
</script></body></html>
