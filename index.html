ndom movement'],0,'Expression supports meaning.'],['mc','FAMILY suggests',['Close group','Object','Street'],0,'Family is represented as a group.'],['arr','Sequence: Please + help',['Please','Help'],[0,1],''],['arr','Mini dialogue: Hello + Me + Name + Help',['Hello','Me','Name','Help'],[0,1,2,3],'']]};

function t(k){return copy[ui]?.[k]||copy.en[k]||k}function save(){localStorage.setItem(KEY,JSON.stringify(S));localStorage.setItem('linguax-ui',ui)}
function makeUnits(lang){let arr=names[lang],cuts=lang==='sign'?[4,7,8]:[4,7,10],from=0;return cuts.map((to,i)=>{let lessons=arr.slice(from,to).map((title,j)=>({id:lang+'-'+(from+j),title,done:0,score:0}));from=to;return{title:['Basics','Daily life','Travel / Dialogue'][i],locked:i>0,quiz:0,lessons}})}
function allLessons(){return S.units.flatMap(u=>u.lessons)}function completed(){return allLessons().filter(l=>l.done).length}function pct(){return Math.round(completed()/allLessons().length*100)}function unlock(){S.units.forEach((u,i)=>u.locked=i&&!S.units[i-1].lessons.every(l=>l.done))}
function apply(){document.documentElement.lang=ui;['contrast','large','reduce','dyslexia','focus'].forEach(k=>document.body.classList.toggle(k,!!S?.a?.[k]))}
function speak(x){try{speechSynthesis.cancel();let u=new SpeechSynthesisUtterance(String(x));u.lang=ui==='ro'?'ro-RO':'en-US';speechSynthesis.speak(u)}catch(e){}}function say(x){let l=$('#live');if(l)l.textContent=x;if(S?.a?.voice&&S?.a?.auto)speak(x)}
function getMistakes(){return JSON.parse(localStorage.getItem(MKEY)||'[]')}function saveMistake(lessonId,questionId,selectedAnswer,correctAnswer){let mistakes=getMistakes();mistakes.push({lessonId,questionId,selectedAnswer,correctAnswer,date:new Date().toISOString()});localStorage.setItem(MKEY,JSON.stringify(mistakes.slice(-80)))}
function landing(){document.body.className='';$('#app').innerHTML=`<main class="wrap"><section class="hero"><div><p class="eyebrow">${t('brand')}</p><h1>Linguax Accessible</h1><p class="lead">${t('hero')}</p><div class="actions"><a class="btn" href="#app-start">${t('start')}</a><a class="btn secondary" href="#accessibility">${t('choose')}</a><a class="btn ghost" href="privacy.html">${t('privacy')}</a></div><div class="chips" style="margin-top:1rem"><span class="pill">✓ ${t('voice')}</span><span class="pill">✓ ${t('contrast')}</span><span class="pill">✓ ${t('focus')}</span><span class="pill">✓ ${t('roen')}</span><span class="pill">✓ ${t('cert')}</span></div></div><aside class="hero-card"><span class="hero-badge">♿</span><h2>English · Romanian · Sign basics</h2><p class="muted">Local progress, mistake review, export/import and certificate preview.</p></aside></section><section id="app-start" class="panel"><form id="f"><div class="grid"><div class="field"><label for="ui">${t('interface')}</label><select id="ui"><option value="en" ${ui==='en'?'selected':''}>English</option><option value="ro" ${ui==='ro'?'selected':''}>Română</option></select></div><div class="field"><label for="name">${t('name')}</label><input id="name" required minlength="2" placeholder="Laura"></div></div><div class="grid"><div class="field"><label for="course">${t('course')}</label><select id="course"><option value="en">🇬🇧 10 English basics</option><option value="ro">🇷🇴 10 Romanian basics</option><option value="sign">🤟 8 Sign language basics</option></select></div><div class="field" id="accessibility"><label for="prof">${t('profile')}</label><select id="prof">${Object.entries(profiles).map(([k,v])=>`<option value="${k}">${v[0]} ${v[1]}</option>`).join('')}</select></div></div><section class="panel"><h2>${t('setup')}</h2><div class="grid"><label class="toggle">${t('contrast')}<input id="contrast" type="checkbox"></label><label class="toggle">${t('large')}<input id="large" type="checkbox"></label><label class="toggle">${t('voice')}<input id="voice" type="checkbox"></label><label class="toggle">${t('reduce')}<input id="reduce" type="checkbox"></label><label class="toggle">${t('focus')}<input id="focus" type="checkbox"></label><label class="toggle">${t('dyslexia')}<input id="dyslexia" type="checkbox"></label></div></section><div class="grid3">${Object.values(courses).map(c=>`<div class="card"><h3>${c[2]}</h3><p class="muted">Accessible lessons + quiz.</p></div>`).join('')}</div><button class="btn full">${t('begin')}</button></form></section></main>`;$('#ui').onchange=e=>{ui=e.target.value;localStorage.setItem('linguax-ui',ui);landing()};$('#prof').onchange=e=>{let a=profiles[e.target.value][2];['contrast','large','voice','reduce','focus','dyslexia'].forEach(k=>{let el=$('#'+k);if(el)el.checked=!!a[k]})};$('#f').onsubmit=e=>{e.preventDefault();let a={keyboard:1,describe:1};Object.assign(a,profiles[$('#prof').value][2]);['contrast','large','voice','reduce','focus','dyslexia'].forEach(k=>a[k]=$('#'+k).checked?1:a[k]||0);a.simple=a.simple||a.focus;S={ui,tab:'learn',course:$('#course').value,u:{name:$('#name').value.trim(),xp:0,gems:0,hearts:5,start:new Date().toISOString().slice(0,10)},a,units:makeUnits($('#course').value),exports:0};save();render()}}
function chrome(){return`<header class="top"><div class="logo"><b>LINGUA</b><span>X</span> Accessible</div><div class="stats"><span class="pill">${courses[S.course][0]} ${courses[S.course][1]}</span><span class="pill">❤️ ${S.u.hearts}</span><span class="pill">💎 ${S.u.gems}</span><span class="pill">⚡ ${S.u.xp}</span><select id="appLang" class="pill" aria-label="${t('interface')}"><option value="en" ${ui==='en'?'selected':''}>EN</option><option value="ro" ${ui==='ro'?'selected':''}>RO</option></select></div></header><main id="main" class="wrap" tabindex="-1"></main><nav id="nav" class="nav"></nav><section id="modal" class="modal" role="dialog" aria-modal="true"></section>`}
const tabs=[['learn','🏠','home'],['practice','🎯','practice'],['mistakes','🧠','mistakes'],['profile','👤','profileTab'],['audit','♿','audit'],['cert','🎓','certificate']];
function render(){if(!S){landing();return}ui=S.ui||ui;unlock();apply();save();$('#app').innerHTML=chrome();let shown=S.a.focus?tabs.filter(x=>!['profile'].includes(x[0])):tabs;$('#nav').innerHTML=shown.map(x=>`<button class="tab" data-t="${x[0]}" aria-current="${S.tab===x[0]?'page':'false'}"><span>${x[1]}</span>${t(x[2])}</button>`).join('');$('#nav').onclick=e=>{let b=e.target.closest('button');if(b){S.tab=b.dataset.t;render()}};$('#appLang').onchange=e=>{S.ui=e.target.value;ui=S.ui;render()};$('#main').innerHTML=(S.a.voice?`<section class="voicebar"><button class="btn secondary" id="read">${t('read')}</button><button class="btn secondary" id="stop">${t('stop')}</button></section>`:'')+views[S.tab]();bind()}

const views={learn(){let p=pct();return`<section class="hero" style="min-height:auto"><div><p class="eyebrow">${t('welcome')}, ${S.u.name}</p><h1>${courses[S.course][1]}</h1><p class="lead">${allLessons().length} ${t('lessons')} · ${t('unitQuiz')} · ${t('review')} · ${t('certificate')} · ${t('audit')}</p></div><div class="big">${courses[S.course][0]}</div></section><section class="panel"><h2>${t('progress')}</h2><p>${completed()}/${allLessons().length} ${t('done')} · ${p}%</p><div class="progress"><div class="bar" style="width:${p}%"></div></div></section>${S.units.map((u,i)=>`<section class="panel"><h2>${u.title}</h2>${u.lessons.map(l=>lessonBtn(l,u.locked)).join('')}${u.lessons.every(l=>l.done)?`<button class="btn secondary full" data-q="${i}">${t('unitQuiz')} ${u.quiz?'✅':''}</button>`:''}</section>`).join('')}`},practice(){return`<section class="panel"><h1>${t('practice')}</h1><div class="grid">${allLessons().map(l=>`<button class="card lesson" data-l="${l.id}"><b>${l.title}</b><span>${l.done?l.score+'%':t('new')}</span></button>`).join('')}</div></section>`},mistakes(){let m=getMistakes();return`<section class="panel"><h1>${t('review')}</h1><div class="actions"><button class="btn secondary" id="clearMistakes">Reset mistakes</button></div>${m.length?m.slice().reverse().map((x,i)=>`<div class="score-row"><span><b>${x.lessonId}</b><br><small>${new Date(x.date).toLocaleString()}</small><br>Selected: ${x.selectedAnswer}<br>Correct: ${x.correctAnswer}</span><button class="btn" data-review="${x.lessonId}">${t('practiceAgain')}</button></div>`).join(''):`<p class="muted">${t('noMistakes')}</p>`}</section>`},profile(){return`<section class="panel"><h1>${S.u.name}</h1><div class="grid"><div class="card"><p class="big">${pct()}%</p><p>${completed()}/${allLessons().length} ${t('done')}</p></div><div class="card"><h2>Accessibility</h2><div class="chips">${settings().map(x=>`<span class="pill">${x}</span>`).join('')}</div></div></div><div class="actions"><button class="btn" id="export">${t('export')}</button><label class="btn secondary" for="importFile">${t('import')}</label><input id="importFile" type="file" accept="application/json" class="sr"><button class="btn ghost" id="reset">${t('reset')}</button></div></section>`},audit(){let a=audit();return`<section class="panel"><p class="eyebrow">Accessibility audit score</p><h1>${a}%</h1><p class="muted">${t('auditLead')}</p><div class="progress"><div class="bar" style="width:${a}%"></div></div>${['contrast','keyboard','voice','describe','reduce','screen reader labels','simple','focus'].map(k=>`<div class="score-row"><span>${k}</span><b class="${(S.a[k]||k==='screen reader labels'||k==='keyboard')?'ok':'warn'}">${(S.a[k]||k==='screen reader labels'||k==='keyboard')?'✓':'○'}</b></div>`).join('')}</section>`},cert(){let ok=completed()===allLessons().length;return`<section class="panel"><h1>${t('certificate')}</h1>${certHTML()}${!ok?`<p class="warn">${t('locked')} ${pct()}%.</p>`:''}<div class="actions"><button class="btn" id="certBtn" ${ok?'':'disabled'}>${t('download')}</button><button class="btn secondary" onclick="window.print()">Print preview</button></div></section>`}};
function bind(){$('#read')?.addEventListener('click',()=>speak($('#main').innerText));$('#stop')?.addEventListener('click',()=>speechSynthesis.cancel());$$('[data-l]').forEach(b=>b.onclick=()=>openLesson(b.dataset.l));$$('[data-q]').forEach(b=>b.onclick=()=>unitQuiz(+b.dataset.q));$$('[data-review]').forEach(b=>b.onclick=()=>openLesson(b.dataset.review));$('#clearMistakes')?.addEventListener('click',()=>{localStorage.removeItem(MKEY);render()});$('#export')?.addEventListener('click',exportProgress);$('#importFile')?.addEventListener('change',importProgress);$('#reset')?.addEventListener('click',()=>{if(confirm('Reset Linguax progress?')){localStorage.removeItem(KEY);S=null;landing()}});$('#certBtn')?.addEventListener('click',downloadCert)}
function find(id){for(let u of S.units){let l=u.lessons.find(x=>x.id===id);if(l)return l}}function qFor(id){let [lang,n]=id.split('-');return qs[lang][+n]||qs[lang][0]}
function openLesson(id){let l=find(id),q=qFor(id);ask(q,id,(good)=>{if(good&&!l.done){l.done=1;l.score=100;S.u.xp+=10;S.u.gems+=5}render()})}function unitQuiz(i){let arr=S.units[i].lessons.map(l=>[l.id,qFor(l.id)]),idx=0,ok=0;function next(){if(idx>=arr.length){S.units[i].quiz=1;S.u.xp+=20;S.u.gems+=10;save();render();alert('Quiz: '+ok+'/'+arr.length);return}let item=arr[idx++];ask(item[1],item[0],g=>{if(g)ok++;next()})}next()}
function ask(q,lessonId,cb){let m=$('#modal'),sel=[];m.classList.add('open');m.innerHTML=`<div class="mhead"><button class="btn secondary" id="x">×</button><h2>${q[1]}</h2></div><div class="mbody" id="qa"></div>`;$('#x').onclick=()=>{m.classList.remove('open');render()};if(q[0]==='mc'){$('#qa').innerHTML=q[2].map((o,i)=>`<button class="option" data-i="${i}">${o}</button>`).join('')+`<p id="fb"></p>`;$$('.option').forEach(b=>b.onclick=()=>{let i=+b.dataset.i,good=i===q[3];if(!good)saveMistake(lessonId,q[1],q[2][i],q[2][q[3]]);$('#fb').innerHTML=`<b class="${good?'ok':'bad'}">${good?t('correct'):t('again')}</b> — ${q[5]}<br><button class="btn" id="cont">${t('continue')}</button>`;$('#cont').onclick=()=>{m.classList.remove('open');cb(good)}})}else{$('#qa').innerHTML=`<div id="sent" class="sentence"></div>${q[2].map((w,i)=>`<button class="word" data-i="${i}">${w}</button>`).join('')}<p id="fb"></p>`;$$('.word').forEach(b=>b.onclick=()=>{sel.push(+b.dataset.i);$('#sent').appendChild(b);if(sel.length===q[3].length){let good=JSON.stringify(sel)===JSON.stringify(q[3]);if(!good)saveMistake(lessonId,q[1],sel.map(i=>q[2][i]).join(' '),q[3].map(i=>q[2][i]).join(' '));$('#fb').innerHTML=`<b class="${good?'ok':'bad'}">${good?t('correct'):t('almost')}</b><br><button class="btn" id="cont">${t('continue')}</button>`;$('#cont').onclick=()=>{m.classList.remove('open');cb(good)}}})}say(q[1])}
function settings(){return Object.entries(S.a).filter(([,v])=>v).map(([k])=>k)}function audit(){let keys=['contrast','keyboard','voice','describe','reduce','simple','focus'];return Math.round((1+keys.filter(k=>S.a[k]).length)/8*100)}
function exportProgress(){let data={app:'Linguax Accessible: Learn Languages',name:S.u.name,course:courses[S.course][1],completed:completed(),total:allLessons().length,progress:pct(),xp:S.u.xp,gems:S.u.gems,accessibilityScore:audit(),settings:settings(),mistakes:getMistakes(),state:S,date:new Date().toISOString()};S.exports++;save();let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(data,null,2)],{type:'application/json'}));a.download='linguax-progress-report.json';a.click();render()}
function importProgress(e){let f=e.target.files[0];if(!f)return;let r=new FileReader();r.onload=()=>{try{let data=JSON.parse(r.result);if(data.state){S=data.state;ui=S.ui||ui;save();render();alert('Progress imported.')}else alert('Invalid Linguax progress file.')}catch(err){alert('Could not import progress file.')}};r.readAsText(f)}
function certHTML(){return`<div class="certificate"><p>Linguax Accessible</p><h2>Certificate of Completion</h2><p>This certifies that</p><h1>${S.u.name}</h1><p>completed ${courses[S.course][1]}</p><p><b>${pct()}% · ${S.u.xp} XP · Audit ${audit()}% · ${new Date().toISOString().slice(0,10)}</b></p></div>`}function downloadCert(){let html='<!doctype html><meta charset=utf-8><title>Linguax Certificate</title><style>body{font-family:Georgia,serif;padding:2rem}.certificate{border:8px double #8a5a00;border-radius:28px;padding:3rem;text-align:center;background:#fff8e8;color:#16110a}button{padding:1rem;border-radius:12px}</style>'+certHTML()+'<p><button onclick="print()">Print certificate</button></p>';let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([html],{type:'text/html'}));a.download='linguax-certificate.html';a.click()}
document.addEventListener('keydown',e=>{if(e.key==='Escape')$('#modal')?.classList.remove('open');if(S&&e.altKey){let map={'1':'learn','2':'practice','3':'mistakes','4':'profile','5':'audit','6':'cert'};if(map[e.key]){S.tab=map[e.key];render()}if(e.key.toLowerCase()==='r')speak($('#main').innerText);if(e.key.toLowerCase()==='s')speechSynthesis.cancel()}});
if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}))}
render();
  </script>
</body>
</html>
