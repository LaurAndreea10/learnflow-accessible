nd:#f5a62318}.toggle{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;border:1px solid #28284a;background:#111118;border-radius:16px;padding:.85rem}.score{display:grid;gap:.55rem}.score-row{display:flex;justify-content:space-between;gap:1rem;border:1px solid #28284a;background:#111118;border-radius:14px;padding:.75rem}.ok{color:#22c55e;font-weight:900}.warn{color:#f5a623;font-weight:900}.desc{border-left:4px solid #f5a623;background:#f5a62312;padding:.75rem;border-radius:12px;margin:.75rem 0}.voicebar{position:sticky;top:58px;z-index:4;background:#111118;border:1px solid #28284a;border-radius:18px;padding:.65rem;margin-bottom:1rem;display:flex;gap:.5rem;flex-wrap:wrap}.focusbox{border:2px solid #f5a623;background:#f5a62312}.timer{font-size:2rem;font-family:Georgia,serif;color:#f5a623}.modal{position:fixed;inset:0;background:#09090f;z-index:10;display:none;flex-direction:column}.modal.open{display:flex}.mhead{display:flex;gap:.8rem;align-items:center;border-bottom:1px solid #28284a;padding:.9rem}.mbody{max-width:760px;width:100%;margin:auto;padding:1rem}.option,.word{border:2px solid #28284a;background:#18182a;color:#f0eef9;border-radius:16px;padding:1rem;font-weight:800;cursor:pointer}.option{display:block;width:100%;margin:.55rem 0;text-align:left}.good{border-color:#22c55e!important;color:#22c55e}.bad{border-color:#f87171!important;color:#f87171}.sentence,.bank{display:flex;flex-wrap:wrap;gap:.5rem}.sentence{min-height:58px;border:2px dashed #28284a;border-radius:16px;padding:.75rem;margin:.8rem 0}.feedback{display:none;border:2px solid #28284a;border-radius:16px;padding:1rem;margin-top:1rem}.feedback.show{display:flex;align-items:center;justify-content:space-between;gap:1rem}.sr{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)}@media(max-width:760px){.hero,.grid,.grid3{grid-template-columns:1fr}.tab{font-size:.68rem;padding:.45rem .2rem}.stats{font-size:.78rem}.feedback{flex-direction:column;align-items:stretch}.voicebar{top:66px}.top{align-items:flex-start;flex-direction:column}}

const LANGS={fr:{name:'Franceză',flag:'🇫🇷',kind:'spoken'},en:{name:'Engleză',flag:'🇬🇧',kind:'spoken'},es:{name:'Spaniolă',flag:'🇪🇸',kind:'spoken'},de:{name:'Germană',flag:'🇩🇪',kind:'spoken'},it:{name:'Italiană',flag:'🇮🇹',kind:'spoken'},ro:{name:'Română',flag:'🇷🇴',kind:'spoken'},sign:{name:'Limbajul semnelor',flag:'🤟',kind:'visual'}};

function makeUnits(lang){if(lang==='sign')return[['Bazele semnelor reale','Salut, mulțumesc, nume, eu, tu','🤟','#f5a623',0,[['sign-hello','Salut','👋',0,0],['sign-thanks','Mulțumesc','🤲',0,0],['sign-name','Nume','🔤',0,0],['sign-me-you','Eu și Tu','👤',0,0]]],['Conversație de bază','Încântat, familie, ajutor','🧭','#9d71ff',1,[['sign-nice','Încântat','🙂',0,0],['sign-family','Familie','👨‍👩‍👧',0,0],['sign-help','Ajutor','🆘',0,0]]],['Mini-dialog accesibil','Secvențe vizuale cu descrieri clare','🎬','#2dd4bf',1,[['sign-dialog','Salut + Nume + Ajutor','💬',0,0]]]];return[['Fundamente','Salutări, persoane, numere și culori','⭐','#f5a623',0,[['l1','Salutări','👋',0,0],['l2','Persoane','👤',0,0],['l3','Numere','🔢',0,0],['l4','Culori','🎨',0,0]]],['Viața de zi cu zi','Familie, casă, mâncare și timp','🏠','#9d71ff',1,[['l5','Familia','👨‍👩‍👧',0,0],['l6','Casa','🏠',0,0]]],['Călătorii','Hotel, restaurant și direcții','✈️','#2dd4bf',1,[['l7','Transport','🚌',0,0],['l8','Hotel','🏨',0,0]]]]}
function fresh(name,lang,level,profile,visual){let a=mergeVisual(mergeProfile(baseA11y(),profile),visual||{});return{started:false,summary:true,tab:'learn',course:{lang,level},u:{name,xp:0,streak:0,hearts:5,gems:0,level:1,weeklyXP:0,weeklyGoal:120,league:'Start'},a,units:makeUnits(lang),shop:[['🧊','Protecție Streak',200,0],['❤️','Inimă Extra',350,0],['⚡','Boost XP ×2',100,0],['📚','Lecție Bonus',500,0]]}}
let S=load();
const spoken={fr:[['mc','Ce înseamnă Bonjour?',['Bună ziua','La revedere','Mulțumesc','Te rog'],0,'Bonjour este salutul francez folosit ziua.'],['arr','Construiește: Mă numesc Marie',['Je','mappelle','Marie','tu'],[0,1,2],'']],en:[['mc','Ce înseamnă Hello?',['Bună','La revedere','Mulțumesc','Noapte bună'],0,'Hello este salutul de bază în engleză.'],['arr','Construiește: My name is Ana',['My','name','is','Ana','hello'],[0,1,2,3],'']],es:[['mc','Ce înseamnă Hola?',['Bună','Mulțumesc','Da','Nu'],0,'Hola este salutul de bază în spaniolă.']],de:[['mc','Ce înseamnă Hallo?',['Bună','La revedere','Mulțumesc','Da'],0,'Hallo este salutul de bază în germană.']],it:[['mc','Ce înseamnă Ciao?',['Bună / Pa','Mulțumesc','Te rog','Nu'],0,'Ciao poate fi folosit informal pentru salut sau la revedere.']],ro:[['mc','Ce înseamnă salut?',['Hello','Goodbye','Thank you','Please'],0,'Pentru utilizatorii străini, româna începe cu saluturi simple.']]};
const SIGN={'sign-hello':[['mc','SALUT: care descriere de gest este corectă?',['Ridică mâna dominantă lângă umăr și mișcă ușor palma spre exterior.','Ține ambele mâini în buzunar.','Bate din palme de două ori.','Arată spre podea.'],0,'Salut: ridică mâna dominantă lângă umăr și mișcă ușor palma spre exterior.'],['arr','Secvența pentru un salut politicos',['Contact vizual','Mână lângă umăr','Palmă spre exterior','Mișcare ușoară'],[0,1,2,3],'']],'sign-thanks':[['mc','MULȚUMESC: ce mișcare este potrivită?',['Adu vârfurile degetelor de la bărbie ușor spre exterior.','Lovește masa cu pumnul.','Acoperă ochii cu ambele mâini.','Întoarce spatele interlocutorului.'],0,'Mulțumesc: vârfurile degetelor pornesc de la bărbie și merg ușor spre exterior.']],'sign-name':[['mc','NUME: ce idee transmite gestul?',['Identificarea persoanei prin nume.','Un obiect greu.','O culoare.','Un drum.'],0,'Nume indică modul în care identificăm o persoană.']],'sign-me-you':[['mc','EU: cum se indică de obicei?',['Arăți spre tine.','Arăți spre cer.','Ții mâna la spate.','Închizi ochii.'],0,'Eu se indică prin orientarea mâinii spre propria persoană.'],['mc','TU: cum se indică de obicei?',['Arăți spre interlocutor cu respect și claritate.','Arăți spre podea.','Acoperi gura.','Ridici ambele picioare.'],0,'Tu se indică prin orientarea gestului către interlocutor.']],'sign-nice':[['mc','ÎNCÂNTAT: ce contează cel mai mult?',['Expresie facială prietenoasă și gest clar.','Vorbire foarte tare.','Fundal colorat.','Text mic.'],0,'Pentru încântat, expresia facială susține sensul gestului.']],'sign-family':[['mc','FAMILIE: ce concept vizual este asociat?',['Grup apropiat / cerc de persoane.','Un singur obiect.','O stradă.','Un număr.'],0,'Familie transmite ideea de grup apropiat.']],'sign-help':[['mc','AJUTOR: ce trebuie transmis?',['Cerere clară de sprijin.','Ignorarea persoanei.','O glumă.','O culoare.'],0,'Ajutor trebuie să fie clar și ușor de recunoscut.'],['arr','Secvență: Te rog + ajutor',['Te rog','Ajutor'],[0,1],'']],'sign-dialog':[['arr','Mini-dialog vizual: Salut + Eu + Nume + Ajutor',['Salut','Eu','Nume','Ajutor'],[0,1,2,3],''],['mc','Într-un dialog vizual accesibil, ce ajută?',['Ritm lent, expresie clară și spațiu bun.','Mișcări foarte rapide.','Lipsa contactului vizual.','Text ascuns.'],0,'Ritmul lent și claritatea ajută învățarea.']]};
const signDefault=[['mc','În limbajul semnelor, ce element ajută mult la sens?',['Expresia facială','Volumul vocii','Fontul textului','Culoarea fundalului'],0,'Expresia facială este parte importantă din comunicarea vizuală.']];
const T=[['learn','🏠','Acasă'],['practice','🎯','Practică'],['quests','📜','Quest-uri'],['leaderboard','🏆','Clasament'],['profile','👤','Profil'],['shop','🛒','Shop'],['access','♿','Acces']];
function speak(t){try{if(!('speechSynthesis'in window))return;window.speechSynthesis.cancel();let u=new SpeechSynthesisUtterance(String(t||'').replace(/[🔥❤️💎⚡🏆🦉🤟⭐🏠✈️👋👤🔢🎨🔤🙂🧭🎬🇫🇷🇬🇧🇪🇸🇩🇪🇮🇹🇷🇴🦯🔍📖🧏⌨️🎯]/g,''));u.lang='ro-RO';u.rate=.95;window.speechSynthesis.speak(u)}catch(e){}}
function stopSpeak(){try{window.speechSynthesis.cancel()}catch(e){}}
function say(t){let l=$('#live');if(l){l.textContent='';requestAnimationFrame(()=>l.textContent=t)}if(S?.a?.voice&&S?.a?.autoRead)speak(t)}
function iconText(i){return ICON_DESC[i]||'element vizual decorativ'}
function pageText(){let m=$('#main');return m?m.innerText.replace(/\s+/g,' ').trim():'Nu există conținut de citit.'}
function readScreen(){speak(pageText())}
function apply(){if(!S)return;['contrast','large','blind','simple','reduce','dyslexia','focus'].forEach(k=>document.body.classList.toggle(k,!!S.a[k]))}

function onboarding(){document.body.className='';$('#app').innerHTML='<main class="onboard"><section class="panel" aria-labelledby="welcome-title"><p class="eyebrow">LINGUAX Accessible · start de la zero</p><h1 id="welcome-title">Alege cursul și accesibilizarea</h1><p class="muted">Scrie prenumele, selectează limba, nivelul, tipul de dizabilitate și setările pentru deficienții de vedere.</p><form id="startForm"><div class="field"><label for="firstName">Prenume</label><input id="firstName" autocomplete="given-name" minlength="2" maxlength="28" required placeholder="Ex: Laura"></div><div class="grid"><div class="field"><label for="language">Limba</label><select id="language">'+Object.entries(LANGS).map(([k,v])=>'<option value="'+k+'">'+v.flag+' '+v.name+'</option>').join('')+'</select></div><div class="field"><label for="level">Nivel</label><select id="level">'+Object.entries(LEVELS).map(([k,v])=>'<option value="'+k+'">'+v+'</option>').join('')+'</select></div></div><div class="field"><label for="disabilityType">Tip de dizabilitate / nevoie de accesibilitate</label><select id="disabilityType"><option value="custom">Fără profil presetat / personalizat</option>'+Object.entries(PROFILES).map(([k,p])=>'<option value="'+k+'">'+p.name+'</option>').join('')+'</select><p class="muted" id="profileHelp">Alegerea aplică automat adaptări potrivite.</p></div><fieldset class="panel" style="box-shadow:none"><legend><b>Accesibilizare pentru deficienții de vedere</b></legend><p class="muted">Poți activa aceste opțiuni chiar înainte de pornirea cursului.</p><div class="grid"><label class="toggle"><span><b>Contrast ridicat</b><br><span class="muted">Fundal foarte întunecat și text mai clar.</span></span><input id="visContrast" type="checkbox"></label><label class="toggle"><span><b>Text mare</b><br><span class="muted">Mărește fontul și butoanele.</span></span><input id="visLarge" type="checkbox"></label><label class="toggle"><span><b>Descriere imagini</b><br><span class="muted">Explică p function readQuestion(q){let text=(q[0]=='mc'?'Întrebare cu variante. ':'Exercițiu de aranjare. ')+q[1]+'. ';if(q[0]=='mc')text+='Opțiuni: '+q[2].map((o,i)=>String.fromCharCode(65+i)+': '+o).join('. ');else text+='Elemente disponibile: '+q[2].join(', ');speak(text)}
function openLesson(id){if(S.u.hearts<1){say('Nu mai ai inimi disponibile.');return}let qs=getQuestions(id),idx=0,score=0,mist=0,chosen=[],$m=$('#modal');function draw(){let q=qs[idx];$m.classList.add('open');$m.innerHTML='<div class="mhead"><button class="btn secondary" id="close">Închide</button><div class="progress secondary-area" style="flex:1"><div class="bar" style="width:'+(idx/qs.length*100)+'%"></div></div><span class="pill">Greșeli '+mist+'</span></div><div class="mbody"><p class="eyebrow">'+(q[0]=='mc'?'Alege răspunsul':'Aranjează secvența')+'</p><h1>'+q[1]+'</h1>'+(S.a.describe?'<div class="desc"><b>Descriere:</b> toate opțiunile sunt text și pot fi citite cu voce tare. Pentru limbajul semnelor, descrierea gestului este inclusă în feedback.</div>':'')+'<div id="qa">'+(q[0]=='mc'?q[2].map((o,i)=>'<button class="option" data-i="'+i+'" aria-label="Opțiunea '+String.fromCharCode(65+i)+': '+o+'">'+String.fromCharCode(65+i)+'. '+o+'</button>').join(''):'<div class="sentence" id="sent"><span class="muted">Apasă elementele...</span></div><div class="bank">'+q[2].map((w,i)=>'<button class="word" data-i="'+i+'">'+w+'</button>').join('')+'</div><button class="btn" id="check" disabled>Verifică</button>')+'</div><div class="feedback" id="fb"><div><b id="ft"></b><p class="muted" id="fe"></p></div><button class="btn" id="next">Continuă</button></div></div>';$('#close').onclick=()=>{$m.classList.remove('open');stopSpeak()};if(q[0]=='mc')$$('.option').forEach(o=>o.onclick=()=>ans(+o.dataset.i==q[3],o));else{chosen=[];$$('.word').forEach(w=>w.onclick=()=>{chosen.push(+w.dataset.i);w.disabled=true;$('#sent').innerHTML=chosen.map(i=>'<span class="word">'+q[2][i]+'</span>').join('');$('#check').disabled=false;speak('Ai adăugat '+w.textContent)});$('#check').onclick=()=>ans(JSON.stringify(chosen)==JSON.stringify(q[3]),$('#check'))}$('#close').focus();if(S.a.voice||S.a.blind)setTimeout(()=>readQuestion(q),120)}function ans(ok,el){if(ok){score++;el.classList.add('good')}else{mist++;el.classList.add('bad')}$('#ft').textContent=ok?'✓ Corect!':'✕ Greșit';$('#ft').style.color=ok?'#22c55e':'#f87171';let q=qs[idx];let msg=(ok?'Corect. ':'Greșit. ')+(q[4]||(!ok&&q[0]=='arr'?'Răspuns corect: '+q[3].map(i=>q[2][i]).join(' '):'Continuă.'));$('#fe').textContent=msg;$('#fb').classList.add('show');speak(msg);$('#next').focus();$('#next').onclick=()=>{if(++idx>=qs.length)return done();draw()}}function done(){let xp=Math.max(5,Math.round(score/qs.length*50)+(mist==0?20:0));S.u.xp+=xp;S.u.gems+=Math.max(1,Math.round(xp/10));S.u.weeklyXP=Math.min(S.u.weeklyGoal,S.u.weeklyXP+xp);S.u.streak=1;if(mist)S.u.hearts=Math.max(0,S.u.hearts-1);S.units.forEach((u,ui)=>u[5].forEach(l=>{if(l[0]==id){l[3]=1;l[4]=mist?0:1}if(ui+1<S.units.length&&u[5].every(x=>x[3]))S.units[ui+1][4]=0}));save();let final='Lecție finalizată. '+score+' din '+qs.length+' corecte. Ai câștigat '+xp+' XP.';$m.innerHTML='<div class="mbody" style="text-align:center"><div class="visual-only decor" style="font-size:5rem" aria-hidden="true">'+(mist?'⭐':'🏆')+'</div><h1>'+(mist?'Bravo!':'Perfect!')+'</h1><p class="muted">'+score+'/'+qs.length+' corecte · +'+xp+' XP</p><button class="btn" id="done">Continuă</button></div>';speak(final);$('#done').focus();$('#done').onclick=()=>{$m.classList.remove('open');say('Lecție completată');render()}}draw()}
render();
</script>
