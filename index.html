function save(){localStorage.setItem(KEY,JSON.stringify(S))}function load(){return JSON.parse(localStorage.getItem(KEY)||'null')}function today(){return new Date().toISOString().slice(0,10)}function dayNum(d){return Math.floor(new Date(d+'T00:00:00').getTime()/86400000)}function weekKey(){let d=new Date(),day=(d.getDay()+6)%7;d.setDate(d.getDate()-day);return d.toISOString().slice(0,10)}

const SIGN={'sign-hello':[['mc','SALUT: care descriere de gest este corectă?',['Ridică mâna dominantă lângă umăr și mișcă ușor palma spre exterior.','Ține ambele mâini în buzunar.','Bate din palme de două ori.','Arată spre podea.'],0,'Salut: ridică mâna dominantă lângă umăr și mișcă ușor palma spre exterior.'],['arr','Secvența pentru un salut politicos',['Contact vizual','Mână lângă umăr','Palmă spre exterior','Mișcare ușoară'],[0,1,2,3],'']],'sign-thanks':[['mc','MULȚUMESC: ce mișcare este potrivită?',['Adu vârfurile degetelor de la bărbie ușor spre exterior.','Lovește masa cu pumnul.','Acoperă ochii cu ambele mâini.','Întoarce spatele interlocutorului.'],0,'Mulțumesc: vârfurile degetelor pornesc de la bărbie și merg ușor spre exterior.']],'sign-name':[['mc','NUME: ce idee transmite gestul?',['Identificarea persoanei prin nume.','Un obiect greu.','O culoare.','Un drum.'],0,'Nume indică modul în care identificăm o persoană.']],'sign-me-you':[['mc','EU: cum se indică de obicei?',['Arăți spre tine.','Arăți spre cer.','Ții mâna la spate.','Închizi ochii.'],0,'Eu se indică prin orientarea mâinii spre propria persoană.'],['mc','TU: cum se indică de obicei?',['Arăți spre interlocutor cu respect și claritate.','Arăți spre podea.','Acoperi gura.','Ridici ambele picioare.'],0,'Tu se indică prin orientarea gestului către interlocutor.']],'sign-nice':[['mc','ÎNCÂNTAT: ce contează cel mai mult?',['Expresie facială prietenoasă și gest clar.','Vorbire foarte tare.','Fundal colorat.','Text mic.'],0,'Pentru încântat, expresia facială susține sensul gestului.']],'sign-family':[['mc','FAMILIE: ce concept vizual este asociat?',['Grup apropiat / cerc de persoane.','Un singur obiect.','O stradă.','Un număr.'],0,'Familie transmite ideea de grup apropiat.']],'sign-help':[['mc','AJUTOR: ce trebuie transmis?',['Cerere clară de sprijin.','Ignorarea persoanei.','O glumă.','O culoare.'],0,'Ajutor trebuie să fie clar și ușor de recunoscut.'],['arr','Secvență: Te rog + ajutor',['Te rog','Ajutor' function speak(t,lang='ro-RO'){try{if(!('speechSynthesis'in window))return;window.speechSynthesis.cancel();let u=new SpeechSynthesisUtterance(String(t||'').replace(/[🔥❤️💎⚡🏆🦉🤟⭐🏠✈️👋👤🔢🎨🔤🙂🧭🎬🇫🇷🇬🇧🇪🇸🇩🇪🇮🇹🇷🇴🦯🔍📖🧏⌨️🎯]/g,''));u.lang=lang;u.rate=.95;window.speechSynthesis.speak(u)}catch(e){}}

function regenHearts(){if(!S?.u)return;let now=Date.now();if(S.u.hearts>=S.u.maxHearts){S.heartUpdatedAt=now;return}let gained=Math.floor((now-(S.heartUpdatedAt||now))/HEART_MS);if(gained>0){S.u.hearts=Math.min(S.u.maxHearts,S.u.hearts+gained);S.heartUpdatedAt=now}}

function openLesson(id){regenHearts();if(S.u.hearts<1){say('Nu mai ai inimi. Următoarea inimă se reîncarcă în curând.');render();return}let qs=getQuestions(id),idx=0,score=0,mist=0,chosen=[],$m=$('#modal');function draw(){let q=qs[idx];$m.classList.add('open');$m.innerHTML='<div class="mhead"><button class="btn secondary" id="close">Închide</button><div class="progress secondary-area" style="flex:1"><div class="bar" style="width:'+(idx/qs.length*100)+'%"></div></div><span class="pill">Greșeli '+mist+'</span></div><div class="mbody"><p class="eyebrow">'+(q[0]=='mc'?'Alege răspunsul':'Aranjează secvența')+'</p><h1>'+q[1]+'</h1>'+(S.a.describe?'<div class="desc"><b>Descriere:</b> opțiunile sunt text și pot fi citite cu voce tare.</div>':'')+'<div id="qa">'+(q[0]=='mc'?q[2].map((o,i)=>'<button class="option" data-i="'+i+'">'+String.fromCharCode(65+i)+'. '+o+'</button>').join(''):'<div class="sentence" id="sent"><span class="muted">Apasă elementele...</span></div><div class="bank">'+q[2].map((w,i)=>'<button class="word" data-i="'+i+'">'+w+'</button>').join('')+'</div><button class="btn secondary" id="resetArrange">Resetează aranjarea</button><button class="btn" id="check" disabled>Verifică</button>')+'</div><div class="feedback" id="fb" role="alert" aria-live="assertive"><div><b id="ft"></b><p class="muted" id="fe"></p></div><button class="btn" id="next">Continuă</button></div></div>';$('#close').onclick=closeModal;if(q[0]=='mc')$$('.option').forEach(o=>o.onclick=()=>ans(+o.dataset.i==q[3],o,q));else{chosen=[];let reset=()=>{chosen=[];$('#sent').innerHTML='<span class="muted">Apasă elementele...</span>';$$('.word').forEach(w=>w.disabled=false);$('#check').disabled=true};$$('.word').forEach(w=>w.onclick=()=>{chosen.push(+w.dataset.i);w.disabled=true;$('#sent').innerHTML=chosen.map(i=>'<span class="word">'+q[2][i]+'</span>').join('');$('#check').disabled=false;speak('Ai adăugat '+w.textContent)});$('#resetArrange').onclick=reset;$('#check').onclick=()=>ans(JSON.stringify(c document.addEventListener('keydown',e=>{if(e.altKey&&e.key.toLowerCase()==='r'){e.preventDefault();readScreen()}if(e.altKey&&e.key.toLowerCase()==='s'){e.preventDefault();stopSpeak()}if(e.key==='Escape'&&$('#modal.open')){e.preventDefault();closeModal()}trapFocus(e)});
render();
