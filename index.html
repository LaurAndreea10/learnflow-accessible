<!doctype html>
<html lang="ro">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>LINGUAX Accessible</title>
<meta name="theme-color" content="#09090f" />
<style>
*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 0 0,#2d1d62,transparent 35%),#09090f;color:#f0eef9;font-family:Inter,Segoe UI,Arial,sans-serif}body.contrast{background:#000;color:#fff}body.large{font-size:118%}body.blind .visual-only{display:none!important}body.blind .hero,body.blind .panel,body.blind .card,body.blind .unit{box-shadow:none;border-width:2px}body.blind .muted{color:#e4ddff}a.skip{position:absolute;top:-90px;left:1rem;background:#f5a623;color:#000;padding:.7rem 1rem;border-radius:0 0 12px 12px;font-weight:900;z-index:20}a.skip:focus{top:0}:focus-visible{outline:3px solid #f5a623;outline-offset:3px}.top{position:sticky;top:0;background:#09090fee;border-bottom:1px solid #28284a;display:flex;justify-content:space-between;gap:1rem;align-items:center;padding:.85rem 1rem;z-index:5}.logo{font-family:Georgia,serif;font-size:1.45rem;font-weight:900}.logo b{color:#f5a623}.logo span{color:#9d71ff}.stats{display:flex;gap:.4rem;flex-wrap:wrap}.pill,.badge{border:1px solid #28284a;background:#18182a;border-radius:999px;padding:.35rem .6rem;font-weight:800}.wrap{max-width:980px;margin:auto;padding:1rem 1rem 6.2rem}.hero,.panel,.card,.unit{background:linear-gradient(180deg,#ffffff0d,#ffffff04),#18182a;border:1px solid #28284a;border-radius:22px;padding:1rem;margin-bottom:1rem;box-shadow:0 18px 45px #0006}.hero{display:grid;grid-template-columns:1fr auto;gap:1rem;align-items:center}.eyebrow{color:#f5a623;text-transform:uppercase;letter-spacing:.12em;font-size:.72rem;font-weight:900}h1,h2{font-family:Georgia,serif;margin:.2rem 0}.hero h1{font-size:clamp(2rem,5vw,4rem);line-height:1}.muted{color:#b7aad8}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:.85rem}.progress{height:10px;background:#28284a;border-radius:999px;overflow:hidden}.bar{height:100%;background:linear-gradient(90deg,#f5a623,#ffe179)}.icon{width:44px;height:44px;border-radius:16px;background:#1e1e38;display:grid;place-items:center;font-size:1.3rem;flex:0 0 auto}.unit-head,.lesson{display:flex;align-items:center;gap:.7rem}.lesson{width:100%;margin-top:.55rem;border:1px solid #28284a;border-radius:16px;background:#111118;color:#f0eef9;padding:.75rem;text-align:left;cursor:pointer}.lesson:disabled{opacity:.45;cursor:not-allowed}.lesson.current{border-color:#f5a623;box-shadow:0 0 0 4px #f5a62318}.badge{margin-left:auto;color:#f5a623;background:#f5a62322;font-size:.75rem}.nav{position:fixed;bottom:0;left:0;right:0;background:#09090ff2;border-top:1px solid #28284a;display:flex;justify-content:center;gap:.15rem;padding:.45rem;z-index:6}.tab{border:0;background:transparent;color:#9e90c8;border-radius:14px;padding:.5rem .45rem;font-weight:800;cursor:pointer;display:flex;flex-direction:column;align-items:center}.tab[aria-current=page]{color:#f5a623;background:#f5a62318}.btn{border:0;border-radius:14px;padding:.85rem 1rem;background:#f5a623;color:#000;font-weight:900;cursor:pointer}.btn.secondary{background:#1e1e38;color:#f0eef9;border:1px solid #28284a}.btn.danger{background:#f87171;color:#000}.btn.full{width:100%;margin:.35rem 0}.field{display:grid;gap:.45rem;margin:1rem 0}.field label{font-weight:900}.field input,.field select{width:100%;border:2px solid #28284a;background:#111118;color:#fff;border-radius:16px;padding:1rem;font-size:1rem}.onboard{min-height:100vh;display:grid;place-items:center;padding:1rem}.onboard .panel{max-width:740px;width:100%;padding:1.4rem}.modal{position:fixed;inset:0;background:#09090f;z-index:10;display:none;flex-direction:column}.modal.open{display:flex}.mhead{display:flex;gap:.8rem;align-items:center;border-bottom:1px solid #28284a;padding:.9rem}.mbody{max-width:720px;width:100%;margin:auto;padding:1rem}.option,.word{border:2px solid #28284a;background:#18182a;color:#f0eef9;border-radius:16px;padding:1rem;font-weight:800;cursor:pointer}.option{display:block;width:100%;margin:.55rem 0;text-align:left}.ok{border-color:#22c55e!important;color:#22c55e}.bad{border-color:#f87171!important;color:#f87171}.sentence,.bank{display:flex;flex-wrap:wrap;gap:.5rem}.sentence{min-height:58px;border:2px dashed #28284a;border-radius:16px;padding:.75rem;margin:.8rem 0}.feedback{display:none;border:2px solid #28284a;border-radius:16px;padding:1rem;margin-top:1rem}.feedback.show{display:flex;align-items:center;justify-content:space-between;gap:1rem}.sr{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)}.desc{border-left:4px solid #f5a623;background:#f5a62312;padding:.75rem;border-radius:12px;margin:.75rem 0}.voicebar{position:sticky;top:58px;z-index:4;background:#111118;border:1px solid #28284a;border-radius:18px;padding:.65rem;margin-bottom:1rem;display:flex;gap:.5rem;flex-wrap:wrap}@media(max-width:720px){.hero,.grid{grid-template-columns:1fr}.tab{font-size:.68rem;padding:.45rem .2rem}.stats{font-size:.78rem}.feedback{flex-direction:column;align-items:stretch}.voicebar{top:66px}.top{align-items:flex-start;flex-direction:column}}
</style>
</head>
<body>
<a class="skip" href="#main">Sari la conținut</a>
<div id="app"></div>
<div class="sr" id="live" role="status" aria-live="polite"></div>
<script>
const KEY='linguax-zero-v3';
const $=(s,r=document)=>r.querySelector(s);const $$=(s,r=document)=>Array.from(r.querySelectorAll(s));
const LANGS={fr:{name:'Franceză',flag:'🇫🇷',kind:'spoken'},en:{name:'Engleză',flag:'🇬🇧',kind:'spoken'},es:{name:'Spaniolă',flag:'🇪🇸',kind:'spoken'},de:{name:'Germană',flag:'🇩🇪',kind:'spoken'},it:{name:'Italiană',flag:'🇮🇹',kind:'spoken'},ro:{name:'Română',flag:'🇷🇴',kind:'spoken'},sign:{name:'Limbajul semnelor',flag:'🤟',kind:'visual'}};
const LEVELS={starter:'Începător absolut',a1:'A1 · Începător',a2:'A2 · Elementar',b1:'B1 · Conversațional',visual0:'Vizual · de la zero'};
const ICON_DESC={'🇫🇷':'steagul Franței','🇬🇧':'steagul Regatului Unit','🇪🇸':'steagul Spaniei','🇩🇪':'steagul Germaniei','🇮🇹':'steagul Italiei','🇷🇴':'steagul României','🤟':'simbol mână pentru limbajul semnelor','⭐':'stea, unitate de bază','🏠':'casă, viața de zi cu zi','✈️':'avion, călătorii','👋':'mână care salută','👤':'persoană','🔢':'numere','🎨':'paletă de culori','🔤':'alfabet','🙂':'față zâmbitoare','🧭':'busolă','🎬':'cadru video','❤️':'inimă','💎':'cristal','⚡':'energie XP','🔥':'flacără streak','🏆':'trofeu','🦉':'bufniță, avatar prietenos'};
const save=()=>localStorage.setItem(KEY,JSON.stringify(S));const load=()=>JSON.parse(localStorage.getItem(KEY)||'null');
function fresh(name,lang,level,blind){return{started:true,tab:'learn',course:{lang,level},u:{name,xp:0,streak:0,hearts:5,gems:0,level:1,weeklyXP:0,weeklyGoal:120,league:'Start'},a:{contrast:blind?1:0,large:blind?1:0,blind:blind?1:0,voice:blind?1:0,autoRead:blind?1:0,describe:1},units:makeUnits(lang),shop:[['🧊','Protecție Streak',200,0],['❤️','Inimă Extra',350,0],['⚡','Boost XP ×2',100,0],['📚','Lecție Bonus',500,0]]}}
function makeUnits(lang){if(lang==='sign')return[['Bazele semnelor','Alfabet manual, saluturi și expresii vizuale','🤟','#f5a623',0,[['s1','Saluturi vizuale','👋',0,0],['s2','Alfabet manual','🔤',0,0],['s3','Expresii faciale','🙂',0,0]]],['Comunicare zilnică','Întrebări, familie și spațiu personal','🧭','#9d71ff',1,[['s4','Întrebări simple','❔',0,0],['s5','Familie','👨‍👩‍👧',0,0]]],['Dialog accesibil','Secvențe vizuale și ritm conversațional','🎬','#2dd4bf',1,[['s6','Mini-dialog','💬',0,0]]]];return[['Fundamente','Salutări, persoane, numere și culori','⭐','#f5a623',0,[['l1','Salutări','👋',0,0],['l2','Persoane','👤',0,0],['l3','Numere','🔢',0,0],['l4','Culori','🎨',0,0]]],['Viața de zi cu zi','Familie, casă, mâncare și timp','🏠','#9d71ff',1,[['l5','Familia','👨‍👩‍👧',0,0],['l6','Casa','🏠',0,0]]],['Călătorii','Hotel, restaurant și direcții','✈️','#2dd4bf',1,[['l7','Transport','🚌',0,0],['l8','Hotel','🏨',0,0]]]]}
let S=load();
const spokenQuestions={fr:[['mc','Ce înseamnă Bonjour?',['Bună ziua','La revedere','Mulțumesc','Te rog'],0,'Bonjour este salutul francez folosit ziua.'],['arr','Construiește: Mă numesc Marie',['Je','mappelle','Marie','tu'],[0,1,2],'']],en:[['mc','Ce înseamnă Hello?',['Bună','La revedere','Mulțumesc','Noapte bună'],0,'Hello este salutul de bază în engleză.'],['arr','Construiește: My name is Ana',['My','name','is','Ana','hello'],[0,1,2,3],'']],es:[['mc','Ce înseamnă Hola?',['Bună','Mulțumesc','Da','Nu'],0,'Hola este salutul de bază în spaniolă.'],['arr','Construiește: Me llamo Ana',['Me','llamo','Ana','hola'],[0,1,2],'']],de:[['mc','Ce înseamnă Hallo?',['Bună','La revedere','Mulțumesc','Da'],0,'Hallo este salutul de bază în germană.'],['arr','Construiește: Ich heiße Ana',['Ich','heiße','Ana','du'],[0,1,2],'']],it:[['mc','Ce înseamnă Ciao?',['Bună / Pa','Mulțumesc','Te rog','Nu'],0,'Ciao poate fi folosit informal pentru salut sau la revedere.'],['arr','Construiește: Mi chiamo Ana',['Mi','chiamo','Ana','ciao'],[0,1,2],'']],ro:[['mc','Ce înseamnă salut?',['Hello','Goodbye','Thank you','Please'],0,'Pentru utilizatorii străini, româna începe cu saluturi simple.'],['arr','Construiește: Mă numesc Ana',['Mă','numesc','Ana','salut'],[0,1,2],'']]};
const signQuestions=[['mc','În limbajul semnelor, ce element ajută mult la sens?',['Expresia facială','Volumul vocii','Fontul textului','Culoarea fundalului'],0,'Expresia facială este parte importantă din comunicarea vizuală.'],['mc','Pentru început, ce exersăm mai întâi?',['Saluturi și alfabet manual','Gramatica avansată','Viteză maximă','Traduceri lungi'],0,'Un traseu accesibil începe cu gesturi simple și clare.'],['arr','Construiește secvența vizuală: Salut + Nume + Încântat',['Salut','Nume','Încântat','Mulțumesc'],[0,1,2],'']];
const T=[['learn','🏠','Acasă'],['practice','🎯','Practică'],['quests','📜','Quest-uri'],['leaderboard','🏆','Clasament'],['profile','👤','Profil'],['shop','🛒','Shop'],['access','♿','Acces']];
function say(t){const l=$('#live');if(l){l.textContent='';requestAnimationFrame(()=>l.textContent=t)}if(S?.a?.voice&&S?.a?.autoRead)speak(t)}
function speak(t){try{if(!('speechSynthesis'in window))return;window.speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(strip(t));u.lang='ro-RO';u.rate=.95;u.pitch=1;window.speechSynthesis.speak(u)}catch(e){}}
function stopSpeak(){try{window.speechSynthesis.cancel()}catch(e){}}
function strip(t){return String(t||'').replace(/[🔥❤️💎⚡🏆🦉🤟⭐🏠✈️👋👤🔢🎨🔤🙂🧭🎬🇫🇷🇬🇧🇪🇸🇩🇪🇮🇹🇷🇴]/g,'')}
function iconText(i){return ICON_DESC[i]||'element vizual decorativ'}
function pageText(){const m=$('#main');return m?m.innerText.replace(/\s+/g,' ').trim():'Nu există conținut de citit.'}
function readScreen(){speak(pageText())}
function apply(){document.body.classList.toggle('contrast',!!S?.a?.contrast);document.body.classList.toggle('large',!!S?.a?.large);document.body.classList.toggle('blind',!!S?.a?.blind)}
function onboarding(){document.body.className='';$('#app').innerHTML='<main class="onboard"><section class="panel" aria-labelledby="welcome-title"><p class="eyebrow">LINGUAX Accessible · start de la zero</p><h1 id="welcome-title">Alege cursul tău</h1><p class="muted">Scrie prenumele, selectează limba și nivelul. Poți porni direct cu modul pentru nevăzători.</p><form id="startForm"><div class="field"><label for="firstName">Prenume</label><input id="firstName" autocomplete="given-name" minlength="2" maxlength="28" required placeholder="Ex: Laura"></div><div class="field"><label for="language">Limba</label><select id="language">'+Object.entries(LANGS).map(([k,v])=>'<option value="'+k+'">'+v.flag+' '+v.name+'</option>').join('')+'</select></div><div class="field"><label for="level">Nivel</label><select id="level">'+Object.entries(LEVELS).map(([k,v])=>'<option value="'+k+'">'+v+'</option>').join('')+'</select></div><label class="card" style="display:flex;justify-content:space-between;gap:1rem"><span><b>Mod pentru nevăzători</b><br><span class="muted">Activează citirea automată, contrastul ridicat, textul mare și descrierile imaginilor.</span></span><input id="blindStart" type="checkbox"></label><div class="panel" style="box-shadow:none"><h2 id="coursePreview">🇫🇷 Franceză</h2><p class="muted" id="courseHelp">Vei începe de la zero: 0 XP, 0 cristale, 0 streak.</p></div><button class="btn" type="submit">Începe cursul</button></form><p class="muted">Zero-cost: folosește doar funcții din browser, inclusiv Web Speech API pentru voce.</p></section></main>';const update=()=>{let l=LANGS[$('#language').value];$('#coursePreview').textContent=l.flag+' '+l.name;$('#courseHelp').textContent=l.kind==='visual'?'Traseu vizual cu exerciții mock pentru semne, expresii faciale și secvențe.':'Traseu de limbă vorbită/scrisă cu vocabular și propoziții simple.';if($('#language').value==='sign')$('#level').value='visual0'};$('#language').onchange=update;update();$('#firstName').focus();$('#startForm').onsubmit=e=>{e.preventDefault();const n=$('#firstName').value.trim().replace(/\s+/g,' ');if(n.length<2){speak('Scrie un prenume de cel puțin două litere.');return}S=fresh(n,$('#language').value,$('#level').value,$('#blindStart').checked);save();render();say('Bun venit, '+n+'. Aplicația a pornit de la zero.')}}
function voiceBar(){if(!S.a.voice&&!S.a.blind)return'';return'<section class="voicebar" aria-label="Comenzi citire cu voce tare"><button class="btn secondary" id="readScreen">Citește ecranul</button><button class="btn secondary" id="stopVoice">Oprește vocea</button><span class="pill">Citire automată: '+(S.a.autoRead?'pornită':'oprită')+'</span></section>'}
function chrome(){return '<header class="top"><div class="logo"><b>LINGUA</b><span>X</span></div><div class="stats"><span class="pill">'+LANGS[S.course.lang].flag+' '+LANGS[S.course.lang].name+'</span><span class="pill">🔥 '+S.u.streak+'</span><span class="pill">❤️ '+S.u.hearts+'</span><span class="pill">💎 '+S.u.gems+'</span><span class="pill">⚡ '+S.u.xp+'</span></div></header><main id="main" class="wrap" tabindex="-1">'+voiceBar()+'</main><nav class="nav" id="nav" aria-label="Navigare principală"></nav><section class="modal" id="modal" role="dialog" aria-modal="true" aria-label="Lecție activă"></section>'}
function render(){if(!S||!S.started){onboarding();return}apply();save();$('#app').innerHTML=chrome();$('#nav').innerHTML=T.map(t=>'<button class="tab" data-t="'+t[0]+'" aria-current="'+(S.tab==t[0]?'page':'false')+'" aria-label="Fila '+t[2]+'"><span aria-hidden="true">'+t[1]+'</span>'+t[2]+'</button>').join('');$('#nav').onclick=e=>{let b=e.target.closest('button');if(!b)return;S.tab=b.dataset.t;render();$('#main').focus();say('Navigat la '+b.textContent+'. '+pageText())};$('#main').innerHTML=voiceBar()+V[S.tab]();bind();if(S.a.autoRead)setTimeout(()=>readScreen(),120)}
function courseTitle(){const l=LANGS[S.course.lang];return l.name+' · '+(LEVELS[S.course.level]||S.course.level)}
const V={learn(){let p=Math.min(100,S.u.weeklyXP/S.u.weeklyGoal*100),l=LANGS[S.course.lang];return '<section class="hero"><div><p class="eyebrow">Bun venit, '+S.u.name+'</p><h1>'+courseTitle()+'</h1><p class="muted">'+(l.kind==='visual'?'Înveți prin semne, ritm vizual și secvențe accesibile.':'Prima lecție este deschisă. Restul se deblochează progresiv.')+'</p>'+(S.a.describe?'<div class="desc"><b>Descriere imagine:</b> simbolul cursului este '+iconText(l.flag)+'. Cardurile folosesc pictograme, dar fiecare lecție are text și etichetă accesibilă.</div>':'')+'</div><div class="icon visual-only" aria-hidden="true" style="width:84px;height:84px;font-size:2.5rem">'+l.flag+'</div></section><section class="panel"><h2>Obiectiv săptămânal</h2><p class="muted">'+S.u.weeklyXP+'/'+S.u.weeklyGoal+' XP</p><div class="progress" role="progressbar" aria-valuenow="'+S.u.weeklyXP+'" aria-valuemin="0" aria-valuemax="'+S.u.weeklyGoal+'" aria-label="Progres săptămânal"><div class="bar" style="width:'+p+'%"></div></div></section>'+S.units.map(unit=>{let done=unit[5].filter(l=>l[3]).length;return '<article class="unit" style="opacity:'+(unit[4]?.55:1)+'" aria-label="Unitatea '+unit[0]+'. '+done+' din '+unit[5].length+' lecții completate"><div class="unit-head"><div class="icon visual-only" aria-hidden="true">'+(unit[4]?'🔒':unit[2])+'</div><div><h2>'+unit[0]+'</h2><p class="muted">'+unit[1]+'</p>'+(S.a.describe?'<p class="muted">Descriere pictogramă: '+iconText(unit[2])+'.</p>':'')+'</div><span class="badge">'+done+'/'+unit[5].length+'</span></div><div class="progress"><div class="bar" style="width:'+(done/unit[5].length*100)+'%;background:'+unit[3]+'"></div></div>'+unit[5].map((x,i)=>'<button class="lesson '+(i==done&&!unit[4]?'current':'')+'" data-lesson="'+x[0]+'" aria-label="Lecția '+x[1]+'. '+(x[3]?'Completată':i==done?'Disponibilă. Apasă pentru start':'Blocată')+'" '+(unit[4]||(!x[3]&&i!=done)?'disabled':'')+'><span class="icon visual-only" aria-hidden="true">'+(x[3]?(x[4]?'⭐':'✓'):x[2])+'</span><span><b>'+x[1]+'</b><br><small class="muted">'+(x[3]?'Completată':i==done?'Începe acum':'Blocată')+'</small>'+(S.a.describe?'<br><small class="muted">Imagine: '+iconText(x[2])+'</small>':'')+'</span>'+(i==done&&!unit[4]?'<span class="badge">START</span>':'')+'</button>').join('')+'</article>'}).join('')},practice(){return '<section class="panel"><h1>Practică</h1><p class="muted">Antrenament pentru '+courseTitle()+'.</p></section><div class="grid">'+[['🔄','Recapitulare'],['📅','Provocare zilnică'],['🎯','Greșelile tale'],['⏱️','Mod viteză']].map(x=>'<button class="card start" aria-label="'+x[1]+'. Pornește o lecție scurtă."><h2><span class="visual-only" aria-hidden="true">'+x[0]+'</span> '+x[1]+'</h2><p class="muted">Pornește o lecție scurtă.</p></button>').join('')+'</div>'},quests(){return '<section class="panel"><h1>Quest-uri</h1><p class="muted">Misiuni inițiale pentru cursul ales.</p></section><div class="grid">'+['Completează prima lecție','Câștigă primii 10 XP','Activează o setare de accesibilitate','Vizitează Profilul'].map((x,i)=>'<div class="card"><h2>'+x+'</h2><p class="muted">Progres 0/1</p><span class="badge">+'+((i+1)*10)+' XP</span></div>').join('')+'</div>'},leaderboard(){let r=[['Marie',2840],['Alex',2510],['Sofia',2230],[S.u.name,S.u.xp],['Ana',1050]];return '<section class="panel"><h1>Clasament</h1><p class="muted">Începi în Liga Start · '+courseTitle()+'</p></section>'+r.map((x,i)=>'<div class="lesson" style="cursor:default;'+(x[0]==S.u.name?'border-color:#f5a623':'')+'" aria-label="Locul '+(i+1)+', '+x[0]+', '+x[1]+' XP"><span class="icon visual-only" aria-hidden="true">'+(i<3?['🥇','🥈','🥉'][i]:i+1)+'</span><b>'+x[0]+'</b><span class="badge">'+x[1]+' XP</span></div>').join('')},profile(){return '<section class="hero"><div><p class="eyebrow">Profil</p><h1>'+S.u.name+'</h1><p class="muted">'+courseTitle()+' · Nivel aplicație '+S.u.level+'</p></div><div class="icon visual-only" aria-hidden="true" style="width:84px;height:84px;font-size:2.5rem">🦉</div></section><div class="grid">'+[['⚡',S.u.xp,'XP Total'],['🔥',S.u.streak,'Streak'],['📚',S.units.flatMap(u=>u[5]).filter(l=>l[3]).length,'Lecții completate'],['💎',S.u.gems,'Cristale']].map(x=>'<div class="card"><h2><span class="visual-only" aria-hidden="true">'+x[0]+'</span> '+x[1]+'</h2><p class="muted">'+x[2]+'</p>'+(S.a.describe?'<p class="muted">Imagine: '+iconText(x[0])+'</p>':'')+'</div>').join('')+'</div><section class="panel"><h2>Schimbă cursul</h2><p class="muted">Resetarea te duce înapoi la formularul cu prenume, limbă și nivel.</p><button class="btn danger" id="reset">Resetează aplicația</button></section>'},shop(){return '<section class="panel"><h1>Shop mock</h1><p class="muted">Nu există plăți reale. Pornești cu 0 cristale.</p></section><div class="grid">'+S.shop.map((x,i)=>'<div class="card"><h2><span class="visual-only" aria-hidden="true">'+x[0]+'</span> '+x[1]+'</h2><p class="muted">Deținut: '+x[3]+'</p>'+(S.a.describe?'<p class="muted">Imagine: '+iconText(x[0])+'</p>':'')+'<button class="btn buy" data-i="'+i+'" '+(S.u.gems<x[2]?'disabled':'')+'>Cost: '+x[2]+' cristale</button></div>').join('')+'</div>'},access(){return '<section class="panel"><h1>Accesibilitate</h1><p class="muted">Include mod pentru nevăzători, citire cu voce tare, descrierea imaginilor, contrast, text mare și anunțuri pentru screen reader.</p></section><section class="panel"><h2>Citire cu voce tare</h2><button class="btn full" id="readScreen">Citește ecranul</button><button class="btn secondary full" id="stopVoice">Oprește vocea</button></section>'+[['blind','Mod pentru nevăzători'],['voice','Activează vocea'],['autoRead','Citire automată la navigare'],['describe','Descriere imagini și pictograme'],['contrast','Contrast ridicat'],['large','Text mare']].map(x=>'<label class="card" style="display:flex;justify-content:space-between;gap:1rem"><span><b>'+x[1]+'</b></span><input data-a="'+x[0]+'" type="checkbox" '+(S.a[x[0]]?'checked':'')+'></label>').join('')+'<section class=" function bind(){$$('[data-lesson]').forEach(b=>b.onclick=()=>openLesson(b.dataset.lesson));$$('.start').forEach(b=>b.onclick=()=>openLesson('default'));$$('[data-a]').forEach(i=>i.onchange=()=>{S.a[i.dataset.a]=i.checked?1:0;if(i.dataset.a==='blind'&&i.checked){S.a.voice=1;S.a.autoRead=1;S.a.describe=1;S.a.contrast=1;S.a.large=1}say('Setare actualizată: '+i.closest('label').innerText);render()});$$('.buy').forEach(b=>b.onclick=()=>{let x=S.shop[b.dataset.i];if(S.u.gems<x[2])return;S.u.gems-=x[2];x[3]++;say('Ai cumpărat '+x[1]);render()});['#reset','#reset2'].forEach(sel=>{let r=$(sel);if(r)r.onclick=()=>{stopSpeak();localStorage.removeItem(KEY);S=null;onboarding();say('Aplicația a fost resetată')}});$$('#readScreen').forEach(b=>b.onclick=readScreen);$$('#stopVoice').forEach(b=>b.onclick=stopSpeak)}
function getQuestions(id){if(S.course.lang==='sign')return signQuestions;if(id==='default')return spokenQuestions[S.course.lang]||spokenQuestions.fr;return spokenQuestions[S.course.lang]||spokenQuestions.fr}
function readQuestion(q){let text=(q[0]=='mc'?'Întrebare cu variante. ':'Exercițiu de aranjare. ')+q[1]+'. ';if(q[0]=='mc')text+='Opțiuni: '+q[2].map((o,i)=>String.fromCharCode(65+i)+': '+o).join('. ');else text+='Elemente disponibile: '+q[2].join(', ');speak(text)}
function openLesson(id){if(S.u.hearts<1){say('Nu mai ai inimi disponibile.');return}let qs=getQuestions(id),idx=0,score=0,mist=0,chosen=[],$m=$('#modal');function draw(){let q=qs[idx];$m.classList.add('open');$m.innerHTML='<div class="mhead"><button class="btn secondary" id="close">Închide</button><div class="progress" style="flex:1"><div class="bar" style="width:'+(idx/qs.length*100)+'%"></div></div><span class="pill">Greșeli '+mist+'</span></div><div class="mbody"><p class="eyebrow">'+(q[0]=='mc'?'Alege răspunsul':'Aranjează secvența')+'</p><h1>'+q[1]+'</h1>'+(S.a.describe?'<div class="desc"><b>Descriere:</b> nu este necesară vederea pentru acest exercițiu. Toate opțiunile sunt text și pot fi citite cu voce tare.</div>':'')+'<div id="qa">'+(q[0]=='mc'?q[2].map((o,i)=>'<button class="option" data-i="'+i+'" aria-label="Opțiunea '+String.fromCharCode(65+i)+': '+o+'">'+String.fromCharCode(65+i)+'. '+o+'</button>').join(''):'<div class="sentence" id="sent"><span class="muted">Apasă elementele...</span></div><div class="bank">'+q[2].map((w,i)=>'<button class="word" data-i="'+i+'">'+w+'</button>').join('')+'</div><button class="btn" id="check" disabled>Verifică</button>')+'</div><div class="feedback" id="fb"><div><b id="ft"></b><p class="muted" id="fe"></p></div><button class="btn" id="next">Continuă</button></div></div>';$('#close').onclick=()=>{$m.classList.remove('open');stopSpeak()};if(q[0]=='mc')$$('.option').forEach(o=>o.onclick=()=>ans(+o.dataset.i==q[3],o));else{chosen=[];$$('.word').forEach(w=>w.onclick=()=>{chosen.push(+w.dataset.i);w.disabled=true;$('#sent').innerHTML=chosen.map(i=>'<span class="word">'+q[2][i]+'</span>').join('');$('#check').disabled=false;speak('Ai adăugat '+w.textContent)});$('#check').onclick=()=>ans(JSON.stringify(chosen)==JSON.stringify(q[3]),$('#check'))}$('#close').focus();if(S.a.voice||S.a.blind)setTimeout(()=>readQuestion(q),120)}function ans(ok,el){if(ok){score++;el.classList.add('ok')}else{mist++;el.classList.add('bad')}$('#ft').textContent=ok?'✓ Corect!':'✕ Greșit';$('#ft').style.color=ok?'#22c55e':'#f87171';let q=qs[idx];let msg=(ok?'Corect. ':'Greșit. ')+(q[4]||(!ok&&q[0]=='arr'?'Răspuns corect: '+q[3].map(i=>q[2][i]).join(' '):'Continuă.'));$('#fe').textContent=msg;$('#fb').classList.add('show');speak(msg);$('#next').focus();$('#next').onclick=()=>{if(++idx>=qs.length)return done();draw()}}function done(){let xp=Math.max(5,Math.round(score/qs.length*50)+(mist==0?20:0));S.u.xp+=xp;S.u.gems+=Math.max(1,Math.round(xp/10));S.u.weeklyXP=Math.min(S.u.weeklyGoal,S.u.weeklyXP+xp);S.u.streak=1;if(mist)S.u.hearts=Math.max(0,S.u.hearts-1);S.units.forEach((u,ui)=>u[5].forEach(l=>{if(l[0]==id||id==='default'){if(l[0]==id){l[3]=1;l[4]=mist?0:1}if(ui+1<S.units.length&&u[5].every(x=>x[3]))S.units[ui+1][4]=0}}));save();let final='Lecție finalizată. '+score+' din '+qs.length+' corecte. Ai câștigat '+xp+' XP.';$m.innerHTML='<div class="mbody" style="text-align:center"><div class="visual-only" style="font-size:5rem" aria-hidden="true">'+(mist?'⭐':'🏆')+'</div><h1>'+(mist?'Bravo!':'Perfect!')+'</h1><p class="muted">'+score+'/'+qs.length+' corecte · +'+xp+' XP</p><button class="btn" id="done">Continuă</button></div>';speak(final);$('#done').focus();$('#done').onclick=()=>{$m.classList.remove('open');say('Lecție completată');render()}}draw()}
