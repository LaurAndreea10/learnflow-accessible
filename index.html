<!doctype html><html lang="ro"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>LINGUAX Accessible</title><meta name="theme-color" content="#09090f"><style>*{box-sizing:border-box}body{margin:0;background:#09090f;color:#f0eef9;font-family:Inter,Segoe UI,Arial,sans-serif}body.contrast{background:#000;color:#fff}body.large{font-size:115%}a.skip{position:absolute;top:-80px;left:1rem;background:#f5a623;color:#000;padding:.7rem 1rem;border-radius:0 0 12px 12px;font-weight:900}a.skip:focus{top:0}:focus-visible{outline:3px solid #f5a623;outline-offset:3px}.top{position:sticky;top:0;background:#09090fee;border-bottom:1px solid #28284a;display:flex;justify-content:space-between;gap:1rem;align-items:center;padding:.85rem 1rem;z-index:2}.logo{font-family:Georgia,serif;font-size:1.45rem;font-weight:900}.logo b{color:#f5a623}.logo span{color:#9d71ff}.stats{display:flex;gap:.4rem;flex-wrap:wrap}.pill,.badge{border:1px solid #28284a;background:#18182a;border-radius:999px;padding:.35rem .6rem;font-weight:800}.wrap{max-width:940px;margin:auto;padding:1rem 1rem 6rem}.hero,.panel,.card,.unit{background:linear-gradient(180deg,#ffffff0b,#ffffff03),#18182a;border:1px solid #28284a;border-radius:22px;padding:1rem;margin-bottom:1rem;box-shadow:0 18px 45px #0006}.hero{display:grid;grid-template-columns:1fr auto;gap:1rem;align-items:center}.eyebrow{color:#f5a623;text-transform:uppercase;letter-spacing:.12em;font-size:.72rem;font-weight:900}h1,h2{font-family:Georgia,serif;margin:.2rem 0}.hero h1{font-size:clamp(2rem,5vw,4rem);line-height:1}.muted{color:#b7aad8}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:.85rem}.progress{height:10px;background:#28284a;border-radius:999px;overflow:hidden}.bar{height:100%;background:linear-gradient(90deg,#f5a623,#ffe179)}.icon{width:44px;height:44px;border-radius:16px;background:#1e1e38;display:grid;place-items:center;font-size:1.3rem}.unit-head,.lesson{display:flex;align-items:center;gap:.7rem}.lesson{width:100%;margin-top:.55rem;border:1px solid #28284a;border-radius:16px;background:#111118;color:#f0eef9;padding:.75rem;text-align:left;cursor:pointer}.lesson:disabled{opacity:.45;cursor:not-allowed}.lesson.current{border-color:#f5a623}.badge{margin-left:auto;color:#f5a623;background:#f5a62322;font-size:.75rem}.nav{position:fixed;bottom:0;left:0;right:0;background:#09090ff2;border-top:1px solid #28284a;display:flex;justify-content:center;gap:.15rem;padding:.45rem;z-index:3}.tab{border:0;background:transparent;color:#9e90c8;border-radius:14px;padding:.5rem .45rem;font-weight:800;cursor:pointer;display:flex;flex-direction:column;align-items:center}.tab[aria-current=page]{color:#f5a623;background:#f5a62318}.btn{border:0;border-radius:14px;padding:.8rem 1rem;background:#f5a623;color:#000;font-weight:900;cursor:pointer}.btn.secondary{background:#1e1e38;color:#f0eef9;border:1px solid #28284a}.modal{position:fixed;inset:0;background:#09090f;z-index:8;display:none;flex-direction:column}.modal.open{display:flex}.mhead{display:flex;gap:.8rem;align-items:center;border-bottom:1px solid #28284a;padding:.9rem}.mbody{max-width:720px;width:100%;margin:auto;padding:1rem}.option,.word{border:2px solid #28284a;background:#18182a;color:#f0eef9;border-radius:16px;padding:1rem;font-weight:800;cursor:pointer}.option{display:block;width:100%;margin:.55rem 0;text-align:left}.ok{border-color:#22c55e!important;color:#22c55e}.bad{border-color:#f87171!important;color:#f87171}.sentence,.bank{display:flex;flex-wrap:wrap;gap:.5rem}.sentence{min-height:58px;border:2px dashed #28284a;border-radius:16px;padding:.75rem;margin:.8rem 0}.feedback{display:none;border:2px solid #28284a;border-radius:16px;padding:1rem;margin-top:1rem}.feedback.show{display:flex;align-items:center;justify-content:space-between;gap:1rem}.sr{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)}@media(max-width:720px){.hero,.grid{grid-template-columns:1fr}.tab{font-size:.68rem;padding:.45rem .2rem}.stats{font-size:.78rem}.feedback{flex-direction:column;align-items:stretch}}</style></head><body><a class="skip" href="#main">Sari la conținut</a><header class="top"><div class="logo"><b>LINGUA</b><span>X</span></div><div class="stats"><span class="pill" id="streak"></span><span class="pill" id="hearts"></span><span class="pill" id="gems"></span><span class="pill" id="xp"></span></div></header><main id="main" class="wrap" tabindex="-1"></main><nav class="nav" id="nav" aria-label="Navigare principală"></nav><section class="modal" id="modal" role="dialog" aria-modal="true" aria-label="Lecție activă"></section><div class="sr" id="live" role="status" aria-live="polite"></div><script>const $=s=>document.querySelector(s),save=()=>localStorage.setItem('linguax',JSON.stringify(S)),load=()=>JSON.parse(localStorage.getItem('linguax')||'null');let S=load()||{tab:'learn',u:{name:'Laura',xp:1240,streak:7,hearts:5,gems:320,level:12,weeklyXP:340,weeklyGoal:500,league:'Aur'},a:{contrast:0,large:0},units:[['Fundamente','Salutări, persoane, numere și culori','⭐','#f5a623',0,[['u1l1','Salutări','👋',1,1],['u1l2','Persoane','👤',1,0],['u1l3','Numere','🔢',1,0],['u1l4','Culori','🎨',0,0],['u1l5','Animale','🐾',0,0]]],['Familie & Casă','Viața de zi cu zi','🏠','#9d71ff',0,[['u2l1','Familia','👨‍👩‍👧',1,1],['u2l2','Casa','🏠',0,0],['u2l3','Mâncare','🍽️',0,0]]],['Călătorii','Hotel, restaurant, direcții','✈️','#2dd4bf',1,[['u3l1','Transport','🚌',0,0],['u3l2','Hotel','🏨',0,0]]]],shop:[['🧊','Protecție Streak',200,1],['❤️','Inimă Extra',350,0],['⚡','Boost XP ×2',100,3],['📚','Lecție Bonus',500,0]]};const Q={u1l1:[['mc','Ce înseamnă Bonjour?',['Bună ziua','La revedere','Mulțumesc','Te rog'],0,'Bonjour este salutul francez folosit ziua.'],['arr','Construiește: Mă numesc Marie',['Je','mappelle','Marie','tu'],[0,1,2],''],['mc','Ce înseamnă Au revoir?',['La revedere','Bună ziua','Mulțumesc','Cu plăcere'],0,'']],u1l4:[['mc','Ce înseamnă rouge?',['roșu','albastru','verde','galben'],0,''],['arr','Construiește: Cerul este albastru',['Le','ciel','est','bleu','rouge'],[0,1,2,3],'']],default:[['mc','Ce înseamnă Merci?',['Mulțumesc','Bună ziua','La revedere','Da'],0,'Merci este expresia franceză de mulțumire.'],['mc','Cum se spune Da în franceză?',['Oui','Non','Peut-être','Jamais'],0,'']]};const T=[['learn','🏠','Acasă'],['practice','🎯','Practică'],['quests','📜','Quest-uri'],['leaderboard','🏆','Clasament'],['profile','👤','Profil'],['shop','🛒','Shop'],['access','♿','Acces']];function say(t){$('#live').textContent='';requestAnimationFrame(()=>$('#live').textContent=t)}function apply(){document.body.classList.toggle('contrast',S.a.contrast);document.body.classList.toggle('large',S.a.large)}function render(){apply();save();$('#xp').textContent='⚡ '+S.u.xp;$('#hearts').textContent='❤️ '+S.u.hearts;$('#gems').textContent='💎 '+S.u.gems;$('#streak').textContent='🔥 '+S.u.streak;$('#nav').innerHTML=T.map(t=>`<button class="tab" data-t="${t[0]}" aria-current="${S.tab==t[0]?'page':'false'}"><span>${t[1]}</span>${t[2]}</button>`).join('');$('#nav').onclick=e=>{let b=e.target.closest('button');if(!b)return;S.tab=b.dataset.t;say('Navigat la '+b.textContent);render();$('#main').focus()};$('#main').innerHTML=V[S.tab]();bind()}const V={learn(){let p=Math.min(100,S.u.weeklyXP/S.u.weeklyGoal*100);return `<section class="hero"><div><p class="eyebrow">Franceză A1 → A2 · zero-cost</p><h1>Învață prin misiuni accesibile.</h1><p class="muted">Backend mock local, progres în browser, design diferit de Duolingo.</p></div><div class="icon" style="width:84px;height:84px;font-size:2.5rem">🇫🇷</div></section><section class="panel"><h2>Obiectiv săptămânal</h2><p class="muted">${S.u.weeklyXP}/${S.u.weeklyGoal} XP</p><div class="progress" role="progressbar" aria-valuenow="${S.u.weeklyXP}" aria-valuemin="0" aria-valuemax="${S.u.weeklyGoal}"><div class="bar" style="width:${p}%"></div></div></section>`+S.units.map(unit=>{let done=unit[5].filter(l=>l[3]).length;return `<article class="unit" style="opacity:${unit[4]?.55:1}"><div class="unit-head"><div class="icon">${unit[4]?'🔒':unit[2]}</div><div><h2>${unit[0]}</h2><p class="muted">${unit[1]}</p></div><span class="badge">${done}/${unit[5].length}</span></div><div class="progress"><div class="bar" style="width:${done/unit[5].length*100}%;background:${unit[3]}"></div></div>`+unit[5].map((l,i)=>`<button class="lesson ${i==done&&!unit[4]?'current':''}" data-lesson="${l[0]}" ${unit[4]||(!l[3]&&i!=done)?'disabled':''}><span class="icon">${l[3]?(l[4]?'⭐':'✓'):l[2]}</span><span><b>${l[1]}</b><br><small class="muted">${l[3]?'Completată':i==done?'Începe acum':'Blocată'}</small></span>${i==done&&!unit[4]?'<span class="badge">START</span>':''}</button>`).join('')+`</article>`}).join('')},practice(){return `<section class="panel"><h1>Practică</h1><p class="muted">Alege un mod de antrenament.</p></section><div class="grid">${[['🔄','Recapitulare'],['📅','Provocare zilnică'],['🎯','Greșelile tale'],['⏱️','Mod viteză']].map(x=>`<button class="card start"><h2>${x[0]} ${x[1]}</h2><p class="muted">Pornește o lecție scurtă.</p></button>`).join('')}</div>`},quests(){return `<section class="panel"><h1>Quest-uri</h1><p class="muted">Misiuni zilnice fără plăți reale.</p></section><div class="grid">${['Completează 2 lecții','Fără greșeli','Practică 5 minute','Cumpără un item mock'].map((x,i)=>`<div class="card"><h2>${x}</h2><p class="muted">Progres ${i?0:1}/2</p><span class="badge">+${(i+1)*10} XP</span></div>`).join('')}</div>`},leaderboard(){let r=[['Marie',2840],['Alex',2510],['Sofia',2230],['Laura',S.u.xp],['Ana',1050]];return `<section class="panel"><h1>Clasament</h1><p class="muted">Liga ${S.u.league}</p></section>`+r.map((x,i)=>`<div class="lesson" style="cursor:default;${x[0]=='Laura'?'border-color:#f5a623':''}"><span class="icon">${i<3?['🥇','🥈','🥉'][i]:i+1}</span><b>${x[0]}</b><span class="badge">${x[1]} XP</span></div>`).join('')},profile(){return `<section class="hero"><div><p class="eyebrow">Profil</p><h1>🦉 ${S.u.name}</h1><p class="muted">Ucenic Poliglot · Liga ${S.u.league} · Nivel ${S.u.level}</p></div></section><div class="grid">${[['⚡',S.u.xp,'XP Total'],['🔥',S.u.streak,'Streak'],['📚',48,'Lecții'],['📅',23,'Zile active']].map(x=>`<div class="card"><h2>${x[0]} ${x[1]}</h2><p class="muted">${x[2]}</p></div>`).join('')}</div>`},shop(){return `<section class="panel"><h1>Shop mock</h1><p class="muted">Nu există plăți reale. Cristalele sunt locale.</p></section><div class="grid">${S.shop.map((x,i)=>`<div class="card"><h2>${x[0]} ${x[1]}</h2><p class="muted">Deținut: ${x[3]}</p><button class="btn buy" data-i="${i}" ${S.u.gems<x[2]?'disabled':''}>💎 ${x[2]}</button></div>`).join('')}</div>`},access(){return `<section class="panel"><h1>Accesibilitate</h1><p class="muted">Tastatură, focus vizibil, contrast, text mare și anunțuri screen reader.</p></section>`+[['contrast','Contrast ridicat'],['large','Text mare']].map(x=>`<label class="card" style="display:flex;justify-content:space-between;gap:1rem"><b>${x[1]}</b><input data-a="${x[0]}" type="checkbox" ${S.a[x[0]]?'checked':''}></label>`).join('')}};function bind(){document.querySelectorAll('[data-lesson]').forEach(b=>b.onclick=()=>openLesson(b.dataset.lesson));document.querySelectorAll('.start').forEach(b=>b.onclick=()=>openLesson('default'));document.querySelectorAll('[data-a]').forEach(i=>i.onchange=()=>{S.a[i.dataset.a]=i.checked?1:0;say('Setare actualizată');render()});document.querySelectorAll('.buy').forEach(b=>b.onclick=()=>{let x=S.shop[b.dataset.i];if(S.u.gems<x[2])return;S.u.gems-=x[2];x[3]++;say('Ai cumpărat '+x[1]);render()})}function openLesson(id){let qs=Q[id]||Q.default,idx=0,score=0,mist=0,chosen=[],$m=$('#modal');function draw(){let q=qs[idx];$m.classList.add('open');$m.innerHTML=`<div class="mhead"><button class="btn secondary" id="close">✕</button><div class="progress" style="flex:1"><div class="bar" style="width:${idx/qs.length*100}%"></div></div><span class="pill">Greșeli ${mist}</span></div><div class="mbody"><p class="eyebrow">${q[0]=='mc'?'Alege răspunsul':'Aranjează cuvintele'}</p><h1>${q[1]}</h1><div>${q[0]=='mc'?q[2].map((o,i)=>`<button class="option" data-i="${i}">${String.fromCharCode(65+i)}. ${o}</button>`).join(''):`<div class="sentence" id="sent"><span class="muted">Apasă cuvintele...</span></div><div class="bank">${q[2].map((w,i)=>`<button class="word" data-i="${i}">${w}</button>`).join('')}</div><button class="btn" id="check" disabled>Verifică</button>`}</div><div class="feedback" id="fb"><div><b id="ft"></b><p class="muted" id="fe"></p></div><button class="btn" id="next">Continuă</button></div></div>`;$('#close').onclick=()=>{$m.classList.remove('open')};if(q[0]=='mc')document.querySelectorAll('.option').forEach(o=>o.onclick=()=>ans(+o.dataset.i==q[3],o));else{chosen=[];document.querySelectorAll('.word').forEach(w=>w.onclick=()=>{chosen.push(+w.dataset.i);w.disabled=true;$('#sent').innerHTML=chosen.map(i=>`<span class="word">${q[2][i]}</span>`).join('');$('#check').disabled=false});$('#check').onclick=()=>ans(JSON.stringify(chosen)==JSON.stringify(q[3]),$('#check'))}$('#close').focus()}function ans(ok,el){if(ok){score++;el.classList.add('ok')}else{mist++;el.classList.add('bad')}$('#ft').textContent=ok?'✓ Corect!':'✕ Greșit';$('#ft').style.color=ok?'#22c55e':'#f87171';let q=qs[idx];$('#fe').textContent=q[4]||(!ok&&q[0]=='arr'?'Corect: '+q[3].map(i=>q[2][i]).join(' '):'Continuă.');$('#fb').classList.add('show');$('#next').focus();$('#next').onclick=()=>{if(++idx>=qs.length)return done();draw()}}function done(){let xp=Math.round(score/qs.length*50)+(mist==0?25:0);S.u.xp+=xp;S.u.weeklyXP=Math.min(S.u.weeklyGoal,S.u.weeklyXP+xp);if(mist)S.u.hearts=Math.max(0,S.u.hearts-1);S.units.forEach(u=>u[5].forEach(l=>{if(l[0]==id){l[3]=1;l[4]=mist?0:1}}));save();$m.innerHTML=`<div class="mbody" style="text-align:center"><div style="font-size:5rem">${mist?'⭐':'🏆'}</div><h1>${mist?'Bravo!':'Perfect!'}</h1><p class="muted">${score}/${qs.length} corecte · +${xp} XP</p><button class="btn" id="done">Continuă</button></div>`;$('#done').focus();$('#done').onclick=()=>{$m.classList.remove('open');say('Lecție completată');render()}}draw()}render();</script></body></html>
