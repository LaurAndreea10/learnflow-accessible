<style>
*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 0 0,#2d1d62,transparent 35%),#09090f;color:#f0eef9;font-family:Inter,Segoe UI,Arial,sans-serif}body.contrast{background:#000;color:#fff}body.large{font-size:118%}a.skip{position:absolute;top:-90px;left:1rem;background:#f5a623;color:#000;padding:.7rem 1rem;border-radius:0 0 12px 12px;font-weight:900;z-index:20}a.skip:focus{top:0}:focus-visible{outline:3px solid #f5a623;outline-offset:3px}.top{position:sticky;top:0;background:#09090fee;border-bottom:1px solid #28284a;display:flex;justify-content:space-between;gap:1rem;align-items:center;padding:.85rem 1rem;z-index:5}.logo{font-family:Georgia,serif;font-size:1.45rem;font-weight:900}.logo b{color:#f5a623}.logo span{color:#9d71ff}.stats{display:flex;gap:.4rem;flex-wrap:wrap}.pill,.badge{border:1px solid #28284a;background:#18182a;border-radius:999px;padding:.35rem .6rem;font-weight:800}.wrap{max-width:980px;margin:auto;padding:1rem 1rem 6.2rem}.hero,.panel,.card,.unit{background:linear-gradient(180deg,#ffffff0d,#ffffff04),#18182a;border:1px solid #28284a;border-radius:22px;padding:1rem;margin-bottom:1rem;box-shadow:0 18px 45px #0006}.hero{display:grid;grid-template-columns:1fr auto;gap:1rem;align-items:center}.eyebrow{color:#f5a623;text-transform:uppercase;letter-spacing:.12em;font-size:.72rem;font-weight:900}h1,h2{font-family:Georgia,serif;margin:.2rem 0}.hero h1{font-size:clamp(2rem,5vw,4rem);line-height:1}.muted{color:#b7aad8}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:.85rem}.progress{height:10px;background:#28284a;border-radius:999px;overflow:hidden}.bar{height:100%;background:linear-gradient(90deg,#f5a623,#ffe179)}.icon{width:44px;height:44px;border-radius:16px;background:#1e1e38;display:grid;place-items:center;font-size:1.3rem;flex:0 0 auto}.unit-head,.lesson{display:flex;align-items:center;gap:.7rem}.lesson{width:100%;margin-top:.55rem;border:1px solid #28284a;border-radius:16px;background:#111118;color:#f0eef9;padding:.75rem;text-align:left;cursor:pointer}.lesson:disabled{opacity:.45;cursor:not-allowed}.lesson.current{border-color:#f5a623;box-shadow:0 0 0 4px #f5a62318}.badge{margin-left:auto;color:#f5a623;background:#f5a62322;font-size:.75rem}.nav{position:fixed;bottom:0;left:0;right:0;background:#09090ff2;border-top:1px solid #28284a;display:flex;justify-content:center;gap:.15rem;padding:.45rem;z-index:6}.tab{border:0;background:transparent;color:#9e90c8;border-radius:14px;padding:.5rem .45rem;font-weight:800;cursor:pointer;display:flex;flex-direction:column;align-items:center}.tab[aria-current=page]{color:#f5a623;background:#f5a62318}.btn{border:0;border-radius:14px;padding:.85rem 1rem;background:#f5a623;color:#000;font-weight:900;cursor:pointer}.btn.secondary{background:#1e1e38;color:#f0eef9;border:1px solid #28284a}.btn.danger{background:#f87171;color:#000}.field{display:grid;gap:.45rem;margin:1rem 0}.field label{font-weight:900}.field input,.field select{width:100%;border:2px solid #28284a;background:#111118;color:#fff;border-radius:16px;padding:1rem;font-size:1rem}.onboard{min-height:100vh;display:grid;place-items:center;padding:1rem}.onboard .panel{max-width:700px;width:100%;padding:1.4rem}.choice{border:2px solid #28284a;background:#111118;color:#f0eef9;border-radius:16px;padding:1rem;text-align:left;cursor:pointer}.choice[aria-pressed=true]{border-color:#f5a623;background:#f5a62318}.modal{position:fixed;inset:0;background:#09090f;z-index:10;display:none;flex-direction:column}.modal.open{display:flex}.mhead{display:flex;gap:.8rem;align-items:center;border-bottom:1px solid #28284a;padding:.9rem}.mbody{max-width:720px;width:100%;margin:auto;padding:1rem}.option,.word{border:2px solid #28284a;background:#18182a;color:#f0eef9;border-radius:16px;padding:1rem;font-weight:800;cursor:pointer}.option{display:block;width:100%;margin:.55rem 0;text-align:left}.ok{border-color:#22c55e!important;color:#22c55e}.bad{border-color:#f87171!important;color:#f87171}.sentence,.bank{display:flex;flex-wrap:wrap;gap:.5rem}.sentence{min-height:58px;border:2px dashed #28284a;border-radius:16px;padding:.75rem;margin:.8rem 0}.feedback{display:none;border:2px solid #28284a;border-radius:16px;padding:1rem;margin-top:1rem}.feedback.show{display:flex;align-items:center;justify-content:space-between;gap:1rem}.sr{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)}@media(max-width:720px){.hero,.grid{grid-template-columns:1fr}.tab{font-size:.68rem;padding:.45rem .2rem}.stats{font-size:.78rem}.feedback{flex-direction:column;align-items:stretch}}
</style>

<script>
const KEY='linguax-zero-v2';
const $=(s,r=document)=>r.querySelector(s);
const $$=(s,r=document)=>Array.from(r.querySelectorAll(s));
const LANGS={fr:{name:'Franceză',flag:'🇫🇷',kind:'spoken'},en:{name:'Engleză',flag:'🇬🇧',kind:'spoken'},es:{name:'Spaniolă',flag:'🇪🇸',kind:'spoken'},de:{name:'Germană',flag:'🇩🇪',kind:'spoken'},it:{name:'Italiană',flag:'🇮🇹',kind:'spoken'},ro:{name:'Română',flag:'🇷🇴',kind:'spoken'},sign:{name:'Limbajul semnelor',flag:'🤟',kind:'visual'}};
const LEVELS={starter:'Începător absolut',a1:'A1 · Începător',a2:'A2 · Elementar',b1:'B1 · Conversațional',visual0:'Vizual · de la zero'};
const save=()=>localStorage.setItem(KEY,JSON.stringify(S));
const load=()=>JSON.parse(localStorage.getItem(KEY)||'null');
function fresh(name,lang,level){return{started:true,tab:'learn',course:{lang,level},u:{name,xp:0,streak:0,hearts:5,gems:0,level:1,weeklyXP:0,weeklyGoal:120,league:'Start'},a:{contrast:0,large:0},units:makeUnits(lang),shop:[['🧊','Protecție Streak',200,0],['❤️','Inimă Extra',350,0],['⚡','Boost XP ×2',100,0],['📚','Lecție Bonus',500,0]]}}
function makeUnits(lang){if(lang==='sign')return[['Bazele semnelor','Alfabet manual, saluturi și expresii vizuale','🤟','#f5a623',0,[['s1','Saluturi vizuale','👋',0,0],['s2','Alfabet manual','🔤',0,0],['s3','Expresii faciale','🙂',0,0]]],['Comunicare zilnică','Întrebări, familie și spațiu personal','🧭','#9d71ff',1,[['s4','Întrebări simple','❔',0,0],['s5','Familie','👨‍👩‍👧',0,0]]],['Dialog accesibil','Secvențe vizuale și ritm conversațional','🎬','#2dd4bf',1,[['s6','Mini-dialog','💬',0,0]]]];return[['Fundamente','Salutări, persoane, numere și culori','⭐','#f5a623',0,[['l1','Salutări','👋',0,0],['l2','Persoane','👤',0,0],['l3','Numere','🔢',0,0],['l4','Culori','🎨',0,0]]],['Viața de zi cu zi','Familie, casă, mâncare și timp','🏠','#9d71ff',1,[['l5','Familia','👨‍👩‍👧',0,0],['l6','Casa','🏠',0,0]]],['Călătorii','Hotel, restaurant și direcții','✈️','#2dd4bf',1,[['l7','Transport','🚌',0,0],['l8','Hotel','🏨',0,0]]]]}
let S=load();
const spokenQuestions={fr:[['mc','Ce înseamnă Bonjour?',['Bună ziua','La revedere','Mulțumesc','Te rog'],0,'Bonjour este salutul francez folosit ziua.'],['arr','Construiește: Mă numesc Marie',['Je','mappelle','Marie','tu'],[0,1,2],'']],en:[['mc','Ce înseamnă Hello?',['Bună','La revedere','Mulțumesc','Noapte bună'],0,'Hello este salutul de bază în engleză.'],['arr','Construiește: My name is Ana',['My','name','is','Ana','hello'],[0,1,2,3],'']],es:[['mc','Ce înseamnă Hola?',['Bună','Mulțumesc','Da','Nu'],0,'Hola este salutul de bază în spaniolă.'],['arr','Construiește: Me llamo Ana',['Me','llamo','Ana','hola'],[0,1,2],'']],de:[['mc','Ce înseamnă Hallo?',['Bună','La revedere','Mulțumesc','Da'],0,'Hallo este salutul de bază în germană.'],['arr','Construiește: Ich heiße Ana',['Ich','heiße','Ana','du'],[0,1,2],'']],it:[['mc','Ce înseamnă Ciao?',['Bună / Pa','Mulțumesc','Te rog','Nu'],0,'Ciao poate fi folosit informal pentru salut sau la revedere.'],['arr','Construiește: Mi chiamo Ana',['Mi','chiamo','Ana','ciao'],[0,1,2],'']],ro:[['mc','Ce înseamnă salut?',['Hello','Goodbye','Thank you','Please'],0,'Pentru utilizatorii străini, româna începe cu saluturi simple.'],['arr','Construiește: Mă numesc Ana',['Mă','numesc','Ana','salut'],[0,1,2],'']]};
const signQuestions=[['mc','În limbajul semnelor, ce element ajută mult la sens?',['Expresia facială','Volumul vocii','Fontul textului','Culoarea fundalului'],0,'Expresia facială este parte importantă din comunicarea vizuală.'],['mc','Pentru început, ce exersăm mai întâi?',['Saluturi și alfabet manual','Gramatica avansată','Viteză maximă','Traduceri lungi'],0,'Un traseu accesibil începe cu gesturi simple și clare.'],['arr','Construiește secvența vizuală: Salut + Nume + Încântat',['Salut','Nume','Încântat','Mulțumesc'],[0,1,2],'']];
const T=[['learn','🏠','Acasă'],['practice','🎯','Practică'],['quests','📜','Quest-uri'],['leaderboard','🏆','Clasament'],['profile','👤','Profil'],['shop','🛒','Shop'],['access','♿','Acces']];
function say(t){const l=$('#live');if(!l)return;l.textContent='';requestAnimationFrame(()=>l.textContent=t)}
function apply(){document.body.classList.toggle('contrast',!!S?.a?.contrast);document.body.classList.toggle('large',!!S?.a?.large)}
function onboarding(){document.body.className='';$('#app').innerHTML='<main class="onboard"><section class="panel" aria-labelledby="welcome-title"><p class="eyebrow">LINGUAX Accessible · start de la zero</p><h1 id="welcome-title">Alege cursul tău</h1><p class="muted">Scrie prenumele, selectează limba și nivelul. Include și un traseu pentru Limbajul semnelor.</p><form id="startForm"><div class="field"><label for="firstName">Prenume</label><input id="firstName" autocomplete="given-name" minlength="2" maxlength="28" required placeholder="Ex: Laura"></div><div class="field"><label for="language">Limba</label><select id="language">'+Object.entries(LANGS).map(([k,v])=>'<option value="'+k+'">'+v.flag+' '+v.name+'</option>').join('')+'</select></div><div class="field"><label for="level">Nivel</label><select id="level">'+Object.entries(LEVELS).map(([k,v])=>'<option value="'+k+'">'+v+'</option>').join('')+'</select></div><div class="panel" style="box-shadow:none"><h2 id="coursePreview">🇫🇷 Franceză</h2><p class="muted" id="courseHelp">Vei începe de la zero: 0 XP, 0 cristale, 0 streak.</p></div><button class="btn" type="submit">Începe cursul</button></form><p class="muted">Zero-cost: nu există plăți, API extern sau backend real.</p></section></main>';const update=()=>{let l=LANGS[$('#language').value];$('#coursePreview').textContent=l.flag+' '+l.name;$('#courseHelp').textContent=l.kind==='visual'?'Traseu vizual cu exerciții mock pentru semne, expresii faciale și secvențe.':'Traseu de limbă vorbită/scrisă cu vocabular și propoziții simple.';if($('#language').value==='sign')$('#level').value='visual0'};$('#language').onchange=update;update();$('#firstName').focus();$('#startForm').onsubmit=e=>{e.preventDefault();const n=$('#firstName').value.trim().replace(/\s+/g,' ');if(n.length<2){say('Scrie un prenume de cel puțin două litere.');return}S=fresh(n,$('#language').value,$('#level').value);save();render();say('Bun venit, '+n)}}
function chrome(){return '<header class="top"><div class="logo"><b>LINGUA</b><span>X</span></div><div class="stats"><span class="pill">'+LANGS[S.course.lang].flag+' '+LANGS[S.course.lang].name+'</span><span class="pill">🔥 '+S.u.streak+'</span><span class="pill">❤️ '+S.u.hearts+'</span><span class="pill">💎 '+S.u.gems+'</span><span class="pill">⚡ '+S.u.xp+'</span></div></header><main id="main" class="wrap" tabindex="-1"></main><nav class="nav" id="nav" aria-label="Navigare principală"></nav><section class="modal" id="modal" role="dialog" aria-modal="true" aria-label="Lecție activă"></section>'}
function render(){if(!S||!S.started){onboarding();return}apply();save();$('#app').innerHTML=chrome();$('#nav').innerHTML=T.map(t=>'<button class="tab" data-t="'+t[0]+'" aria-current="'+(S.tab==t[0]?'page':'false')+'"><span>'+t[1]+'</span>'+t[2]+'</button>').join('');$('#nav').onclick=e=>{let b=e.target.closest('button');if(!b)return;S.tab=b.dataset.t;render();$('#main').focus();say('Navigat la '+b.textContent)};$('#main').innerHTML=V[S.tab]();bind()}
function courseTitle(){const l=LANGS[S.course.lang];return l.flag+' '+l.name+' · '+(LEVELS[S.course.level]||S.course.level)}
const V={learn(){let p=Math.min(100,S.u.weeklyXP/S.u.weeklyGoal*100),l=LANGS[S.course.lang];return '<section class="hero"><div><p class="eyebrow">Bun venit, '+S.u.name+'</p><h1>'+courseTitle()+'</h1><p class="muted">'+(l.kind==='visual'?'Înveți prin semne, ritm vizual și secvențe accesibile.':'Prima lecție este deschisă. Restul se deblochează progresiv.')+'</p></div><div class="icon" style="width:84px;height:84px;font-size:2.5rem">'+l.flag+'</div></section><section class="panel"><h2>Obiectiv săptămânal</h2><p class="muted">'+S.u.weeklyXP+'/'+S.u.weeklyGoal+' XP</p><div class="progress" role="progressbar" aria-valuenow="'+S.u.weeklyXP+'" aria-valuemin="0" aria-valuemax="'+S.u.weeklyGoal+'"><div class="bar" style="width:'+p+'%"></div></div></section>'+S.units.map(unit=>{let done=unit[5].filter(l=>l[3]).length;return '<article class="unit" style="opacity:'+(unit[4]?.55:1)+'"><div class="unit-head"><div class="icon">'+(unit[4]?'🔒':unit[2])+'</div><div><h2>'+unit[0]+'</h2><p class="muted">'+unit[1]+'</p></div><span class="badge">'+done+'/'+unit[5].length+'</span></div><div class="progress"><div class="bar" style="width:'+(done/unit[5].length*100)+'%;background:'+unit[3]+'"></div></div>'+unit[5].map((x,i)=>'<button class="lesson '+(i==done&&!unit[4]?'current':'')+'" data-lesson="'+x[0]+'" '+(unit[4]||(!x[3]&&i!=done)?'disabled':'')+'><span class="icon">'+(x[3]?(x[4]?'⭐':'✓'):x[2])+'</span><span><b>'+x[1]+'</b><br><small class="muted">'+(x[3]?'Completată':i==done?'Începe acum':'Blocată')+'</small></span>'+(i==done&&!unit[4]?'<span class="badge">START</span>':'')+'</button>').join('')+'</article>'}).join('')},practice(){return '<section class="panel"><h1>Practică</h1><p class="muted">Antrenament pentru '+courseTitle()+'.</p></section><div class="grid">'+[['🔄','Recapitulare'],['📅','Provocare zilnică'],['🎯','Greșelile tale'],['⏱️','Mod viteză']].map(x=>'<button class="card start"><h2>'+x[0]+' '+x[1]+'</h2><p class="muted">Pornește o lecție scurtă.</p></button>').join('')+'</div>'},quests(){return '<section class="panel"><h1>Quest-uri</h1><p class="muted">Misiuni inițiale pentru cursul ales.</p></section><div class="grid">'+['Completează prima lecție','Câștigă primii 10 XP','Activează o setare de accesibilitate','Vizitează Profilul'].map((x,i)=>'<div class="card"><h2>'+x+'</h2><p class="muted">Progres 0/1</p><span class="badge">+'+((i+1)*10)+' XP</span></div>').join('')+'</div>'},leaderboard(){let r=[['Marie',2840],['Alex',2510],['Sofia',2230],[S.u.name,S.u.xp],['Ana',1050]];return '<section class="panel"><h1>Clasament</h1><p class="muted">Începi în Liga Start · '+courseTitle()+'</p></section>'+r.map((x,i)=>'<div class="lesson" style="cursor:default;'+(x[0]==S.u.name?'border-color:#f5a623':'')+'"><span class="icon">'+(i<3?['🥇','🥈','🥉'][i]:i+1)+'</span><b>'+x[0]+'</b><span class="badge">'+x[1]+' XP</span></div>').join('')},profile(){return '<section class="hero"><div><p class="eyebrow">Profil</p><h1>🦉 '+S.u.name+'</h1><p class="muted">'+courseTitle()+' · Nivel aplicație '+S.u.level+'</p></div></section><div class="grid">'+[['⚡',S.u.xp,'XP Total'],['🔥',S.u.streak,'Streak'],['📚',S.units.flatMap(u=>u[5]).filter(l=>l[3]).length,'Lecții completate'],['💎',S.u.gems,'Cristale']].map(x=>'<div class="card"><h2>'+x[0]+' '+x[1]+'</h2><p class="muted">'+x[2]+'</p></div>').join('')+'</div><section class="panel"><h2>Schimbă cursul</h2><p class="muted">Resetarea te duce înapoi la formularul cu prenume, limbă și nivel.</p><button class="btn danger" id="reset">Resetează aplicația</button></section>'},shop(){return '<section class="panel"><h1>Shop mock</h1><p class="muted">Nu există plăți reale. Pornești cu 0 cristale.</p></section><div class="grid">'+S.shop.map((x,i)=>'<div class="card"><h2>'+x[0]+' '+x[1]+'</h2><p class="muted">Deținut: '+x[3]+'</p><button class="btn buy" data-i="'+i+'" '+(S.u.gems<x[2]?'disabled':'')+'>💎 '+x[2]+'</button></div>').join('')+'</div>'},access(){return '<section class="panel"><h1>Accesibilitate</h1><p class="muted">Tastatură, focus vizibil, contrast, text mare și anunțuri pentru screen reader.</p></section>'+[['contrast','Contrast ridicat'],['large','Text mare']].map(x=>'<label class="card" style="display:flex;justify-content:space-between;gap:1rem"><b>'+x[1]+'</b><input data-a="'+x[0]+'" type="checkbox" '+(S.a[x[0]]?'checked':'')+'></label>').join('')+'<section class="panel"><button class="btn danger" id="reset2">Reîncepe cu altă limbă / alt nivel</button></section>'}};
function bind(){$$('[data-lesson]').forEach(b=>b.onclick=()=>openLesson(b.dataset.lesson));$$('.start').forEach(b=>b.onclick=()=>openLesson('default'));$$('[data-a]').forEach(i=>i.onchange=()=>{S.a[i.dataset.a]=i.checked?1:0;say('Setare actualizată');render()});$$('.buy').forEach(b=>b.onclick=()=>{let x=S.shop[b.dataset.i];if(S.u.gems<x[2])return;S.u.gems-=x[2];x[3]++;say('Ai cumpărat '+x[1]);render()});['#reset','#reset2'].forEach(sel=>{let r=$(sel);if(r)r.onclick=()=>{localStorage.removeItem(KEY);S=null;onboarding();say('Aplicația a fost resetată')}})}
function getQuestions(id){if(S.course.lang==='sign')return signQuestions;if(id==='default')return spokenQuestions[S.course.lang]||spokenQuestions.fr;return spokenQuestions[S.course.lang]||spokenQuestions.fr}
function openLesson(id){if(S.u.hearts<1){say('Nu mai ai inimi disponibile.');return}let qs=getQuestions(id),idx=0,score=0,mist=0,chosen=[],$m=$('#modal');function draw(){let q=qs[idx];$m.classList.add('open');$m.innerHTML='<div class="mhead"><button class="btn secondary" id="close">✕</button><div class="progress" style="flex:1"><div class="bar" style="width:'+(idx/qs.length*100)+'%"></div></div><span class="pill">Greșeli '+mist+'</span></div><div class="mbody"><p class="eyebrow">'+(q[0]=='mc'?'Alege răspunsul':'Aranjează secvența')+'</p><h1>'+q[1]+'</h1><div id="qa">'+(q[0]=='mc'?q[2].map((o,i)=>'<button class="option" data-i="'+i+'">'+String.fromCharCode(65+i)+'. '+o+'</button>').join(''):'<div class="sentence" id="sent"><span class="muted">Apasă elementele...</span></div><div class="bank">'+q[2].map((w,i)=>'<button class="word" data-i="'+i+'">'+w+'</button>').join('')+'</div><button class="btn" id="check" disabled>Verifică</button>')+'</div><div class="feedback" id="fb"><div><b id="ft"></b><p class="muted" id="fe"></p></div><button class="btn" id="next">Continuă</button></div></div>';$('#close').onclick=()=>{$m.classList.remove('open')};if(q[0]=='mc')$$('.option').forEach(o=>o.onclick=()=>ans(+o.dataset.i==q[3],o));else{chosen=[];$$('.word').forEach(w=>w.onclick=()=>{chosen.push(+w.dataset.i);w.disabled=true;$('#sent').innerHTML=chosen.map(i=>'<span class="word">'+q[2][i]+'</span>').join('');$('#check').disabled=false});$('#check').onclick=()=>ans(JSON.stringify(chosen)==JSON.stringify(q[3]),$('#check'))}$('#close').focus()}function ans(ok,el){if(ok){score++;el.classList.add('ok')}else{mist++;el.classList.add('bad')}$('#ft').textContent=ok?'✓ Corect!':'✕ Greșit';$('#ft').style.color=ok?'#22c55e':'#f87171';let q=qs[idx];$('#fe').textContent=q[4]||(!ok&&q[0]=='arr'?'Corect: '+q[3].map(i=>q[2][i]).join(' '):'Continuă.');$('#fb').classList.add('show');$('#next').focus();$('#next').onclick=()=>{if(++idx>=qs.length)return done();draw()}}function done(){let xp=Math.max(5,Math.round(score/qs.length*50)+(mist==0?20:0));S.u.xp+=xp;S.u.gems+=Math.max(1,Math.round(xp/10));S.u.weeklyXP=Math.min(S.u.weeklyGoal,S.u.weeklyXP+xp);S.u.streak=1;if(mist)S.u.hearts=Math.max(0,S.u.hearts-1);S.units.forEach((u,ui)=>u[5].forEach(l=>{if(l[0]==id||id==='default'){if(l[0]==id){l[3]=1;l[4]=mist?0:1}if(ui+1<S.units.length&&u[5].every(x=>x[3]))S.units[ui+1][4]=0}}));save();$m.innerHTML='<div class="mbody" style="text-align:center"><div style="font-size:5rem">'+(mist?'⭐':'🏆')+'</div><h1>'+(mist?'Bravo!':'Perfect!')+'</h1><p class="muted">'+score+'/'+qs.length+' corecte · +'+xp+' XP</p><button class="btn" id="done">Continuă</button></div>';$('#done').focus();$('#done').onclick=()=>{$m.classList.remove('open');say('Lecție completată');render()}}draw()}
render();
</script>
